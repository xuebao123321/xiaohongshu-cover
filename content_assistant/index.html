<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram 内容策划助手</title>
<meta name="description" content="把 Reddit 痛点、审稿意见、论文写作问题转成 Carousel 文案、Reels 脚本和私信转化钩子。">
<style>
/* ═══════════ 字体加载 ═══════════ */
@import url('https://fonts.font.im/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@700;900&family=DM+Serif+Display&display=swap');

/* ═══════════ 重置 ═══════════ */
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:"Noto Serif SC","PingFang SC","Microsoft YaHei",serif;
  background:#f7f5f2;padding:24px 20px 60px;color:#2d2a26;
  line-height:1.6;min-height:100vh;
}
button{font-family:inherit;cursor:pointer}

/* ═══════════ 容器 ═══════════ */
.page-container{max-width:1280px;margin:0 auto}

/* ═══════════ Header ═══════════ */
.page-header{
  text-align:center;margin-bottom:24px;max-width:800px;
  margin-left:auto;margin-right:auto;
}
.page-header .back-link{
  display:inline-block;margin-bottom:10px;font-size:12px;color:#8a8a8a;
  text-decoration:none;letter-spacing:.5px;transition:color .15s;
}
.page-header .back-link:hover{color:#1f4b73}
.page-header h1{
  font-family:"DM Serif Display","Noto Serif SC",serif;
  font-size:28px;font-weight:400;color:#1a1a1a;
  letter-spacing:.5px;font-style:italic;margin-bottom:6px;
}
.page-header .subtitle{color:#8a8a8a;font-size:13px;letter-spacing:1px;line-height:1.7}

/* ═══════════ Error / Info banners ═══════════ */
.banner{
  max-width:1280px;margin:0 auto 16px;padding:10px 16px;border-radius:10px;
  font-size:13px;font-weight:600;display:none;align-items:center;gap:8px;
}
.banner.error{background:#fff5f5;border:1.5px solid #ED0108;color:#b71c1c;display:flex}
.banner.info{background:#eef4f8;border:1.5px solid #5a8cb8;color:#1f4b73;display:flex}

/* ═══════════ Main Grid ═══════════ */
.main-grid{
  display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start;
}

/* ═══════════ Input Panel (Left) ═══════════ */
.input-panel{
  background:#fff;border:1.5px solid #e8e4df;border-radius:14px;
  padding:20px;position:sticky;top:20px;
}
.input-panel .panel-title{
  font-size:16px;font-weight:900;color:#1a1a1a;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.form-group{margin-bottom:14px}
.form-group label{
  display:block;font-size:12px;font-weight:700;color:#5a5a5a;
  margin-bottom:5px;letter-spacing:.4px;
}
.form-group select,
.form-group textarea,
.form-group input[type="text"]{
  width:100%;padding:10px 12px;border:1.5px solid #e8e4df;
  border-radius:10px;font-size:13px;color:#2d2a26;outline:none;
  background:#faf9f7;transition:border-color .15s;font-family:inherit;
}
.form-group select:focus,
.form-group textarea:focus,
.form-group input[type="text"]:focus{
  border-color:#5a8cb8;background:#fff;
}
.form-group textarea{
  resize:vertical;min-height:120px;line-height:1.6;
}
.form-group .field-hint{
  font-size:11px;color:#a8a098;margin-top:4px;
}

/* Checkbox group */
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px}
.checkbox-pill{position:relative}
.checkbox-pill input{position:absolute;opacity:0;pointer-events:none}
.checkbox-pill label{
  display:inline-block;padding:6px 12px;border:1.5px solid #e0dcd6;
  border-radius:20px;font-size:12px;color:#5a5a5a;
  cursor:pointer;transition:all .15s;background:#faf9f7;
  user-select:none;margin:0;
}
.checkbox-pill input:checked + label{
  background:#1a1a1a;color:#fff;border-color:#1a1a1a;
}
.checkbox-pill label:hover{border-color:#5a8cb8}

/* Strategy section divider */
.strategy-section{
  border-top:1px solid #f0ece6;padding-top:14px;margin-top:4px;
}
.strategy-section .section-label{
  font-size:11px;font-weight:700;color:#a8a098;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:12px;
}

/* Primary generate button */
.btn-generate{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:#1a1a1a;color:#fff;font-size:15px;font-weight:800;
  letter-spacing:.8px;transition:all .15s;margin-top:6px;
}
.btn-generate:hover{background:#333;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.btn-generate:disabled{opacity:.5;pointer-events:none;transform:none;box-shadow:none}

/* Loading indicator */
.loading-indicator{
  display:none;align-items:center;justify-content:center;gap:10px;
  margin-top:14px;padding:12px;background:#faf9f7;border-radius:10px;
  font-size:13px;color:#5a5a5a;
}
.loading-indicator.show{display:flex}
.spinner{
  width:20px;height:20px;border:2.5px solid #e8e4df;
  border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Quick topics */
.quick-topics-section{margin-top:14px;border-top:1px solid #f0ece6;padding-top:14px}
.quick-topics-section .section-label{
  font-size:11px;font-weight:700;color:#a8a098;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:10px;
}
.quick-topics-grid{display:flex;flex-wrap:wrap;gap:6px}
.quick-topic-btn{
  padding:5px 10px;border:1px solid #e8e4df;border-radius:16px;
  background:#fff;font-size:11px;color:#5a5a5a;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.quick-topic-btn:hover{background:#f0ece6;border-color:#c8c4be;color:#2d2a26}

/* ═══════════ Result Panel (Right) ═══════════ */
.result-panel{
  background:#fff;border:1.5px solid #e8e4df;border-radius:14px;
  padding:24px;min-height:400px;
}
.result-panel .panel-title{
  font-size:16px;font-weight:900;color:#1a1a1a;margin-bottom:16px;
}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:300px;color:#a8a098;
  text-align:center;padding:40px 20px;
}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state .empty-text{font-size:14px;line-height:1.8}

/* Result topic header */
.result-topic-header{
  margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #f0ece6;
}
.result-topic-header .topic-title{
  font-size:18px;font-weight:900;color:#1a1a1a;margin-bottom:4px;
}
.result-topic-header .topic-angle{
  font-size:13px;color:#5a5a5a;margin-bottom:6px;
}
.result-topic-header .topic-pillar{
  display:inline-block;padding:3px 10px;background:#eef4f8;
  color:#1f4b73;border-radius:12px;font-size:11px;font-weight:700;
}

/* Tabs */
.result-tabs{
  display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px;
  border-bottom:1.5px solid #e8e4df;padding-bottom:0;
}
.result-tab{
  padding:8px 14px;border:none;background:none;font-size:12px;
  font-weight:700;color:#a8a098;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1.5px;
  transition:all .15s;white-space:nowrap;
}
.result-tab:hover{color:#5a5a5a}
.result-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}

/* Tab content panels */
.tab-content{display:none}
.tab-content.active{display:block}

/* ── Carousel slides ── */
.carousel-slides{display:flex;flex-direction:column;gap:10px}
.slide-card{
  display:flex;gap:14px;padding:14px;background:#faf9f7;
  border-radius:10px;border-left:4px solid #ccc;
  transition:box-shadow .15s;
}
.slide-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.slide-card.hook{border-left-color:#ED0108}
.slide-card.common_mistake{border-left-color:#f0a030}
.slide-card.diagnosis{border-left-color:#5a8cb8}
.slide-card.framework{border-left-color:#4caf50}
.slide-card.example{border-left-color:#9c27b0}
.slide-card.checklist{border-left-color:#00bcd4}
.slide-card.cta{border-left-color:#ED0108}
.slide-card.placeholder{border-left-color:#d0d0d0}

.slide-number{
  flex-shrink:0;width:32px;height:32px;border-radius:50%;
  background:#1a1a1a;color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:900;
}
.slide-body{flex:1;min-width:0}
.slide-role{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:6px;
  background:#f0ece6;color:#8a8a8a;
}
.slide-title{font-size:14px;font-weight:800;color:#1a1a1a;margin-bottom:4px}
.slide-text{font-size:13px;color:#5a5a5a;line-height:1.6;white-space:pre-wrap}

/* ── Reels script ── */
.reels-meta{
  display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;
}
.reels-meta .meta-item{
  padding:6px 12px;background:#faf9f7;border-radius:8px;
  font-size:12px;font-weight:700;color:#5a5a5a;
}
.reels-hook{
  background:#fff5f5;border:1px solid #ffcccc;border-radius:10px;
  padding:12px 16px;margin-bottom:14px;font-size:13px;color:#b71c1c;
  font-weight:700;
}
.reels-hook .hook-label{
  display:block;font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:#ED0108;margin-bottom:4px;
}
.reels-script-box{
  background:#faf9f7;border-radius:10px;padding:16px;
  font-size:13px;line-height:1.8;white-space:pre-wrap;color:#2d2a26;
  margin-bottom:14px;max-height:300px;overflow-y:auto;
}
.timeline-table{width:100%;border-collapse:collapse;font-size:12px}
.timeline-table th{
  background:#faf9f7;padding:8px 10px;text-align:left;
  font-size:10px;font-weight:700;color:#8a8a8a;letter-spacing:.5px;
  text-transform:uppercase;border-bottom:1.5px solid #e8e4df;
}
.timeline-table td{
  padding:8px 10px;border-bottom:1px solid #f0ece6;
  vertical-align:top;line-height:1.5;
}
.broll-list,.shot-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.broll-chip,.shot-chip{
  padding:4px 10px;background:#f0f7f0;color:#3a6b3a;
  border-radius:12px;font-size:11px;
}

/* ── Caption ── */
.caption-firstline{
  font-size:14px;font-weight:900;color:#1a1a1a;margin-bottom:8px;
}
.caption-full{
  background:#faf9f7;border-radius:10px;padding:14px;
  font-size:13px;line-height:1.8;white-space:pre-wrap;color:#2d2a26;
}
.caption-cta{
  margin-top:10px;padding:8px 14px;background:#fff5f5;
  border-radius:8px;font-size:12px;color:#ED0108;font-weight:700;
}

/* ── Hashtags ── */
.hashtags-cloud{display:flex;flex-wrap:wrap;gap:8px}
.hashtag-chip{
  display:inline-block;padding:6px 14px;background:#eef4f8;
  color:#1f4b73;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;user-select:none;
}
.hashtag-chip:hover{background:#d6e8f4;transform:translateY(-1px)}
.hashtag-chip.copied{background:#d4edda;color:#2d6a3a}

/* ── DM Hook ── */
.dm-hook-box{
  background:linear-gradient(135deg,#faf9f7,#f5f3ef);
  border:1.5px solid #e8e4df;border-radius:12px;
  padding:18px 20px;font-size:14px;line-height:1.7;
  color:#2d2a26;position:relative;
}
.dm-hook-box::before{
  content:'"';position:absolute;top:-8px;left:12px;
  font-size:36px;color:#e8e4df;font-family:serif;line-height:1;
}

/* ── Story ── */
.story-card{
  background:#faf9f7;border:1px solid #e8e4df;border-radius:12px;
  padding:16px;margin-bottom:12px;transition:box-shadow .15s;
}
.story-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.05)}
.story-card.poll-card{border-left:3px solid #f0a030}
.story-card.question-card{border-left:3px solid #5a8cb8}
.story-label{
  font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:#a8a098;margin-bottom:8px;
}
.poll-question{font-size:14px;font-weight:800;color:#1a1a1a;margin-bottom:10px}
.poll-options{display:flex;flex-direction:column;gap:6px}
.poll-option{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  border:1.5px solid #e0dcd6;border-radius:10px;font-size:13px;
  color:#5a5a5a;background:#fff;
}
.poll-option-letter{
  width:24px;height:24px;border-radius:50%;background:#f0ece6;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#8a8a8a;flex-shrink:0;
}
.question-text{font-size:14px;font-weight:700;color:#2d2a26;margin-bottom:8px}
.question-input-placeholder{
  padding:12px 16px;background:#fff;border:1.5px dashed #e0dcd6;
  border-radius:10px;text-align:center;
}
.question-input-placeholder .input-hint{font-size:12px;color:#c8c4be}

/* ── Compliance ── */
.compliance-pass{
  display:flex;align-items:center;gap:8px;padding:14px 16px;
  background:#f0f7f0;border:1px solid #c8e6c9;border-radius:10px;
  font-size:13px;color:#3a6b3a;font-weight:600;
}
.compliance-pass .pass-icon{font-size:20px}
.compliance-warning{
  background:#fff5f5;border:1px solid #ffcdd2;border-left:4px solid #ED0108;
  border-radius:10px;padding:16px;
}
.compliance-warning .compliance-icon{font-size:20px;margin-bottom:8px}
.compliance-warning .compliance-text{flex:1;min-width:0}
.compliance-warning strong{color:#b71c1c;display:block;margin-bottom:8px}
.risk-list{list-style:none;padding:0}
.risk-list li{
  padding:6px 0;font-size:12px;color:#5a5a5a;line-height:1.5;
  border-bottom:1px solid #ffebee;
}
.risk-list li:last-child{border-bottom:none}
.risk-word{color:#ED0108;font-weight:700;text-decoration:line-through}
.safe-word{color:#3a6b3a;font-weight:600}
.compliance-notes{
  margin-top:12px;padding:12px 16px;background:#eef4f8;
  border-radius:10px;font-size:12px;color:#1f4b73;line-height:1.6;
}
.compliance-notes strong{font-size:12px}

/* ═══════════ Content block header (with copy btn) ═══════════ */
.content-block-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.content-block-header .block-label{
  font-size:13px;font-weight:700;color:#1a1a1a;
}
.btn-icon{
  width:32px;height:32px;border-radius:8px;border:1px solid #e0dcd6;
  background:#fff;font-size:14px;cursor:pointer;color:#8a8a8a;
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.btn-icon:hover{background:#f5f3ef;border-color:#c8c4be;color:#2d2a26}

/* ═══════════ Action buttons row ═══════════ */
.action-row{
  display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;
  padding-top:16px;border-top:1px solid #f0ece6;
}
.btn{padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;transition:all .15s}
.btn.primary{background:#1a1a1a;color:#fff;border:1.5px solid #1a1a1a}
.btn.primary:hover{background:#333;border-color:#333}
.btn.secondary{background:#fff;color:#2d2a26;border:1.5px solid #e0dcd6}
.btn.secondary:hover{background:#f5f3ef;border-color:#c8c4be}
.btn.danger{background:#fff;color:#ED0108;border:1.5px solid #ffcdd2}
.btn.danger:hover{background:#fff5f5}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:8px}
.btn:disabled{opacity:.45;pointer-events:none}

/* ═══════════ Rewrite Modal ═══════════ */
.modal-mask{
  position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9998;
  display:none;align-items:center;justify-content:center;padding:18px;
}
.modal-mask.show{display:flex}
.rewrite-modal{
  width:min(560px,100%);background:#fff;border-radius:14px;
  border:1.5px solid #e8e4df;box-shadow:0 24px 80px rgba(0,0,0,.22);
  padding:24px;max-height:90vh;overflow-y:auto;
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;
}
.modal-header h3{font-size:18px;font-weight:900;color:#1a1a1a}
.modal-close{
  width:32px;height:32px;border-radius:8px;border:1px solid #e8e4df;
  background:#fff;cursor:pointer;font-size:18px;line-height:1;
  color:#5a5a5a;display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{background:#f5f3ef}
.result-box{
  background:#faf9f7;border-radius:10px;padding:14px;
  font-size:13px;line-height:1.7;white-space:pre-wrap;margin-top:8px;
}

/* ═══════════ History ═══════════ */
.history-section{
  margin-top:20px;background:#fff;border:1.5px solid #e8e4df;
  border-radius:14px;padding:20px;
}
.history-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;gap:10px;
}
.history-header .section-label{
  font-size:15px;font-weight:900;color:#1a1a1a;
}
.history-actions{display:flex;gap:8px;align-items:center}
.input-sm{
  padding:6px 12px;border:1.5px solid #e0dcd6;border-radius:8px;
  font-size:12px;outline:none;width:160px;font-family:inherit;
}
.input-sm:focus{border-color:#5a8cb8}
.btn.ghost{
  background:none;border:1px solid #e0dcd6;color:#8a8a8a;
  font-size:11px;padding:5px 10px;border-radius:8px;
}
.btn.ghost:hover{background:#f5f3ef;color:#5a5a5a}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:#faf9f7;border-radius:10px;
  gap:12px;transition:background .15s;
}
.history-item:hover{background:#f0ece6}
.history-item-main{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.history-time{font-size:11px;color:#a8a098;white-space:nowrap;font-variant-numeric:tabular-nums}
.history-topic{font-size:13px;font-weight:600;color:#2d2a26;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.history-type{
  padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;
  background:#f0ece6;color:#8a8a8a;white-space:nowrap;
}
.history-item-actions{display:flex;gap:4px;flex-shrink:0}
.empty-hint{text-align:center;padding:24px;color:#a8a098;font-size:13px}

/* ═══════════ Shot list table ═══════════ */
.shot-list-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.shot-list-table th{
  background:#faf9f7;padding:8px 10px;text-align:left;
  font-size:10px;font-weight:700;color:#8a8a8a;letter-spacing:.5px;
  text-transform:uppercase;border-bottom:1.5px solid #e8e4df;
}
.shot-list-table td{
  padding:8px 10px;border-bottom:1px solid #f0ece6;
  vertical-align:top;line-height:1.5;
}

/* ═══════════ Utility ═══════════ */
.text-muted{color:#a8a098;font-size:12px}
.mt-8{margin-top:8px}
.mt-12{margin-top:12px}
.mb-8{margin-bottom:8px}

/* ═══════════ Responsive ═══════════ */
@media(max-width:900px){
  .main-grid{grid-template-columns:1fr}
  .input-panel{position:static}
}
@media(max-width:768px){
  body{padding:16px 12px 40px}
  .page-header h1{font-size:22px}
  .page-header .subtitle{font-size:11px}
  .input-panel,.result-panel,.history-section{padding:14px}
  .result-tabs{gap:2px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .result-tab{font-size:11px;padding:6px 10px;white-space:nowrap}
  .action-row{flex-direction:column}
  .action-row .btn{width:100%;text-align:center}
  .checkbox-group{gap:4px}
  .checkbox-pill label{padding:5px 8px;font-size:10px}
}
@media(max-width:480px){
  body{padding:12px 8px 32px}
  .page-header h1{font-size:18px}
  .input-panel{border-radius:10px}
  .btn-generate{font-size:14px;padding:12px}

<!-- ═══════════ JavaScript ═══════════ -->
<script>
/* ═══════════════════════════════════════════════════════════════
 * Instagram 内容策划助手 — Application Logic
 * ═══════════════════════════════════════════════════════════════ */

// ── Config ──
const API_BASE = 'https://umerlbslkytuvqjalfai.supabase.co/functions/v1/instagram-content-api';

const HIGH_RISK_WORDS = [
  'guaranteed acceptance','guaranteed publication','we write your paper',
  'ghostwriting','publish it for you','contract cheating','fake data',
  'do your assignment','代写','包发表','保录用'
];

const SAFE_ALTERNATIVES = {
  'ghostwriting':'academic writing coaching',
  'guaranteed acceptance':'improve your chances',
  'guaranteed publication':'strengthen your manuscript',
  'we write your paper':'we coach your writing',
  '代写':'学术写作辅导','包发表':'提升发表机会','保录用':'优化投稿策略'
};

const HISTORY_KEY = 'instagram_content_history';
const MAX_HISTORY = 20;

// ── State ──
window._currentResult = null;

// ── DOM Ready ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btnGenerate').addEventListener('click', generateContent);
  document.getElementById('btnCopyAll')?.addEventListener('click', copyAllContent);
  document.getElementById('btnSendToCarousel')?.addEventListener('click', sendToCarouselGenerator);
  document.getElementById('btnExportJson')?.addEventListener('click', exportResultAsJson);
  document.getElementById('btnExportTeleprompter')?.addEventListener('click', exportTeleprompter);
  document.getElementById('btnExportScenes')?.addEventListener('click', exportScenesJson);
  document.getElementById('btnRewrite')?.addEventListener('click', openRewritePanel);
  document.getElementById('btnDoRewrite')?.addEventListener('click', doRewrite);
  document.getElementById('btnApplyRewrite')?.addEventListener('click', applyRewrite);
  document.getElementById('btnGenerateVideoPlan')?.addEventListener('click', generateVideoPlan);
  document.getElementById('rewriteContentType')?.addEventListener('change', updateRewriteOriginalText);
  document.getElementById('rewriteSlideIndex')?.addEventListener('change', updateRewriteOriginalText);
  document.getElementById('historySearch')?.addEventListener('input', debounce(renderHistory, 300));

  // Tab switching
  document.querySelectorAll('.result-tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });

  // Quick topic buttons
  document.querySelectorAll('.quick-topic-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('sourceText').value = btn.dataset.topic;
      document.getElementById('sourceType').value = 'topic';
      document.getElementById('btnGenerate')?.scrollIntoView({ behavior: 'smooth' });
    });
  });

  // Keyboard shortcut: Ctrl+Enter / Cmd+Enter
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      generateContent();
    }
  });

  // Check for Reddit Radar prefill
  checkRedditRadarPrefill();

  // Render initial history
  renderHistory();
});

// ── Form data collection ──
function collectFormData() {
  const formats = [];
  document.querySelectorAll('input[name="formats"]:checked').forEach(cb => formats.push(cb.value));
  return {
    sourceType: document.getElementById('sourceType').value,
    sourceText: document.getElementById('sourceText').value.trim(),
    audience: document.getElementById('audience').value,
    goal: document.getElementById('goal').value,
    painPoint: document.getElementById('painPoint').value,
    formats: formats.length > 0 ? formats : ['carousel','reels','caption','hashtags','story','dm_hook'],
    tone: document.getElementById('tone').value,
    ctaLevel: document.getElementById('ctaLevel').value,
    languageMode: document.getElementById('languageMode').value,
    brandRule: { noGhostwriting:true, noGuaranteedAcceptance:true, noFakeData:true, noDoWorkForUser:true }
  };
}

// ── API call ──
async function generateContent() {
  const formData = collectFormData();
  if (!formData.sourceText) { showError('请先输入素材内容。'); return; }
  if (formData.sourceText.length > 8000) { showError('素材内容过长，请控制在 8000 字符以内。'); return; }

  showLoading(true); hideError(); hideResults();

  try {
    const response = await fetch(`${API_BASE}/generate-instagram-content`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });
    if (!response.ok) {
      if (response.status === 429) throw new Error('请求过于频繁，请稍后重试。');
      const errData = await response.json().catch(() => ({}));
      throw new Error(errData.error || `API 错误 (${response.status})`);
    }
    const result = await response.json();
    if (!result.ok && result.error) throw new Error(result.error);

    result._formData = formData;
    window._currentResult = result;
    renderResults(result);
    saveToHistory(formData, result);
  } catch (error) {
    showError(error.message || '生成失败，请稍后重试。');
    console.error('Generation error:', error);
  } finally {
    showLoading(false);
  }
}

// ── Render results ──
function renderResults(result) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultContent').style.display = 'block';

  // Topic header
  document.getElementById('resultTopic').textContent = result.topic || '';
  document.getElementById('resultAngle').textContent = result.angle || '';
  document.getElementById('resultPillar').textContent = result.contentPillar || '';

  // Render each section
  renderCarousel(result.carousel);
  renderReels(result.reels);
  renderCaptionData(result.caption);
  renderHashtags(result.hashtags);
  renderDmHook(result.dmHook);
  renderStory(result.story);
  renderCompliance(result.complianceNotes, result.riskFlags);

  // Switch to carousel tab by default
  switchTab('carousel');

  // Scroll to result
  document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
}

function renderCarousel(carousel) {
  const container = document.getElementById('carouselSlides');
  if (!carousel || !Array.isArray(carousel.slides) || carousel.slides.length === 0) {
    container.innerHTML = '<div class="empty-hint">未生成 Carousel 内容</div>';
    return;
  }
  container.innerHTML = carousel.slides.map(s => `
    <div class="slide-card ${s.role || 'placeholder'}">
      <div class="slide-number">${s.slide}</div>
      <div class="slide-body">
        <span class="slide-role">${escapeHtml(s.role || 'slide')}</span>
        <div class="slide-title">${escapeHtml(s.title || '')}</div>
        ${s.body ? `<div class="slide-text">${escapeHtml(s.body)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function renderReels(reels) {
  if (!reels) {
    document.getElementById('reelsMeta').innerHTML = '<div class="empty-hint">未生成 Reels 内容</div>';
    return;
  }
  document.getElementById('reelsMeta').innerHTML = `
    <span class="meta-item">⏱ ${reels.duration || '?'}s</span>
    ${reels.title ? `<span class="meta-item">${escapeHtml(reels.title)}</span>` : ''}
  `;
  const hookEl = document.getElementById('reelsHook');
  if (reels.hook) {
    hookEl.style.display = 'block';
    hookEl.innerHTML = `<span class="hook-label">🎣 Hook (0-2s)</span>${escapeHtml(reels.hook)}`;
  } else { hookEl.style.display = 'none'; }

  document.getElementById('reelsScript').textContent = reels.script || '';

  // Timeline table
  if (reels.timeline && reels.timeline.length > 0) {
    document.getElementById('timelineTable').innerHTML = `
      <thead><tr><th>时间</th><th>目的</th><th>口播</th><th>屏幕文字</th></tr></thead>
      <tbody>${reels.timeline.map(t => `
        <tr>
          <td>${escapeHtml(t.time || '')}</td>
          <td>${escapeHtml(t.purpose || '')}</td>
          <td>${escapeHtml(t.voiceover || '')}</td>
          <td>${escapeHtml(t.onScreenText || '')}</td>
        </tr>
      `).join('')}</tbody>
    `;
  } else {
    document.getElementById('timelineTable').innerHTML = '';
  }

  // B-roll ideas
  const broll = reels.brollIdeas || [];
  document.getElementById('reelsBroll').innerHTML = broll.length > 0
    ? `<div class="content-block-header"><span class="block-label">🎥 B-roll 建议</span></div><div class="broll-list">${broll.map(b => `<span class="broll-chip">${escapeHtml(b)}</span>`).join('')}</div>`
    : '';

  document.getElementById('reelsCta').textContent = reels.cta || '';

  // On-screen text
  const ost = reels.onScreenText || [];
  if (ost.length > 0) {
    const shotListEl = document.getElementById('reelsBroll');
    shotListEl.innerHTML += `<div class="content-block-header mt-12"><span class="block-label">📺 屏幕文字</span></div><div class="shot-list">${ost.map(s => `<span class="shot-chip">${escapeHtml(s)}</span>`).join('')}</div>`;
  }
}

function renderCaptionData(caption) {
  if (!caption) {
    document.getElementById('captionFirstLine').textContent = '未生成';
    document.getElementById('captionFull').textContent = '';
    document.getElementById('captionCta').textContent = '';
    return;
  }
  if (typeof caption === 'string') {
    const lines = caption.split('\n');
    document.getElementById('captionFirstLine').textContent = lines[0] || '';
    document.getElementById('captionFull').textContent = caption;
    document.getElementById('captionCta').textContent = '';
  } else {
    document.getElementById('captionFirstLine').textContent = caption.firstLine || '';
    document.getElementById('captionFull').textContent = caption.caption || '';
    document.getElementById('captionCta').textContent = caption.cta || '';
  }
}

function renderHashtags(hashtags) {
  const container = document.getElementById('hashtagsCloud');
  if (!Array.isArray(hashtags) || hashtags.length === 0) {
    container.innerHTML = '<div class="empty-hint">未生成 Hashtags</div>';
    return;
  }
  container.innerHTML = hashtags.map(h => `
    <span class="hashtag-chip" onclick="copyHashtag(this)" data-tag="${escapeHtml(h)}">${escapeHtml(h)}</span>
  `).join('');
}

function renderDmHook(dmHook) {
  document.getElementById('dmHookBox').textContent = dmHook || '未生成 DM 钩子';
}

function renderStory(storyItems) {
  const container = document.getElementById('storyContent');
  if (!storyItems || storyItems.length === 0) {
    container.innerHTML = '<div class="empty-hint">未生成 Story 内容</div>';
    return;
  }
  container.innerHTML = storyItems.map((item, idx) => {
    const escaped = escapeHtml(JSON.stringify(item)).replace(/'/g, "&#39;");
    if (item.type === 'poll') {
      return `<div class="story-card poll-card">
        <div class="story-label">📊 投票互动</div>
        <div class="poll-question">${escapeHtml(item.text)}</div>
        <div class="poll-options">${(item.options||[]).map((o,i) => `
          <div class="poll-option"><span class="poll-option-letter">${String.fromCharCode(65+i)}</span><span>${escapeHtml(o)}</span></div>
        `).join('')}</div>
        <div class="mt-8"><button class="btn secondary btn-sm" onclick="copyStoryItem(${idx})">📋 复制此 Story</button></div>
      </div>`;
    } else if (item.type === 'question') {
      return `<div class="story-card question-card">
        <div class="story-label">💬 提问互动</div>
        <div class="question-text">${escapeHtml(item.text)}</div>
        <div class="question-input-placeholder"><span class="input-hint">✍️ 粉丝在此输入回答...</span></div>
        <div class="mt-8"><button class="btn secondary btn-sm" onclick="copyStoryItem(${idx})">📋 复制此 Story</button></div>
      </div>`;
    }
    return '';
  }).join('');
}

function copyStoryItem(index) {
  const result = window._currentResult;
  if (!result?.story || !result.story[index]) return;
  const item = result.story[index];
  let text = item.text || '';
  if (item.type === 'poll' && item.options) {
    text += '\n' + item.options.map((o, i) => String.fromCharCode(65 + i) + '. ' + o).join('\n');
  }
  copyToClipboard(text);
  showInfo('✅ Story 内容已复制');
}

function renderCompliance(notes, flags) {
  const container = document.getElementById('complianceContent');
  const allText = extractAllText(window._currentResult);
  const frontendRisks = scanForRisks(allText);
  const allRisks = [...new Set([...(flags||[]), ...frontendRisks])];

  let html = '';
  if (allRisks.length > 0) {
    html += '<div class="compliance-warning"><div class="compliance-icon">⚠️</div>';
    html += '<strong>检测到以下高风险表达，建议替换：</strong><ul class="risk-list">';
    allRisks.forEach(risk => {
      const alt = SAFE_ALTERNATIVES[risk.toLowerCase()] || '请使用合规的服务描述';
      html += `<li><span class="risk-word">"${escapeHtml(risk)}"</span> → <span class="safe-word">${escapeHtml(alt)}</span></li>`;
    });
    html += '</ul><button class="btn danger btn-sm mt-8" onclick="rewriteToReduceRisk()">🛡️ 降低风险重写</button></div>';
  } else {
    html += '<div class="compliance-pass"><span class="pass-icon">✅</span> 内容合规检查通过，未检测到代写、包发表、保证录用等高风险表达。</div>';
  }
  if (notes && notes.length > 0) {
    html += '<div class="compliance-notes"><strong>📋 合规说明：</strong><ul style="margin:4px 0 0 16px;padding:0">';
    notes.forEach(n => { html += `<li>${escapeHtml(n)}</li>`; });
    html += '</ul></div>';
  }
  container.innerHTML = html;
}

function scanForRisks(text) {
  if (!text) return [];
  const lower = text.toLowerCase();
  return HIGH_RISK_WORDS.filter(w => lower.includes(w.toLowerCase()));
}

function extractAllText(result) {
  if (!result) return '';
  const parts = [];
  if (result.topic) parts.push(result.topic);
  if (result.angle) parts.push(result.angle);
  if (result.carousel?.slides) result.carousel.slides.forEach(s => { parts.push(s.title,s.body||''); });
  if (result.reels?.script) parts.push(result.reels.script);
  if (result.reels?.hook) parts.push(result.reels.hook);
  if (result.caption) parts.push(typeof result.caption==='string'?result.caption:result.caption.caption||'');
  if (result.dmHook) parts.push(result.dmHook);
  return parts.join(' ');
}

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.result-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const tabBtn = document.querySelector(`.result-tab[data-tab="${name}"]`);
  if (tabBtn) tabBtn.classList.add('active');
  const content = document.getElementById(`tab-${name}`);
  if (content) content.classList.add('active');
}

// ── Loading / Error / Info ──
function showLoading(show) {
  const loader = document.getElementById('loadingIndicator');
  const btn = document.getElementById('btnGenerate');
  if (loader) loader.classList.toggle('show', show);
  if (btn) { btn.disabled = show; btn.textContent = show ? '⏳ AI 正在策划内容...' : '🚀 生成 Instagram 内容包'; }
}
function showError(msg) {
  const el = document.getElementById('errorBanner');
  if (el) { el.textContent = '⚠️ ' + msg; el.style.display = 'flex'; }
  clearTimeout(window._errorTimer);
  window._errorTimer = setTimeout(() => { if (el) el.style.display = 'none'; }, 8000);
}
function showInfo(msg) {
  const el = document.getElementById('infoBanner');
  if (el) { el.textContent = 'ℹ️ ' + msg; el.style.display = 'flex'; }
  clearTimeout(window._infoTimer);
  window._infoTimer = setTimeout(() => { if (el) el.style.display = 'none'; }, 5000);
}
function hideError() { const el = document.getElementById('errorBanner'); if (el) el.style.display = 'none'; }
function hideResults() {
  document.getElementById('resultContent').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
}

// ── Copy ──
async function copyToClipboard(text, btnEl) {
  try {
    await navigator.clipboard.writeText(text);
    if (btnEl) { const orig = btnEl.textContent; btnEl.textContent = '✅ 已复制!'; setTimeout(() => { btnEl.textContent = orig; }, 2000); }
  } catch (_) {
    const ta = document.createElement('textarea'); ta.value = text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    if (btnEl) { btnEl.textContent = '✅'; setTimeout(() => { btnEl.textContent = '📋'; }, 2000); }
  }
}

function copyBlock(id) {
  const el = document.getElementById(id);
  if (el) copyToClipboard(el.textContent);
}

function copyHashtag(el) {
  const tag = el.dataset.tag;
  copyToClipboard(tag, el);
  el.classList.add('copied');
  setTimeout(() => el.classList.remove('copied'), 1500);
}

function copyAllHashtags() {
  const result = window._currentResult;
  if (result?.hashtags) copyToClipboard(result.hashtags.join(' '), document.querySelector('#tab-hashtags .btn-icon'));
}

function copyAllContent() {
  const result = window._currentResult;
  if (!result) return;
  let text = '';
  if (result.topic) text += `📌 ${result.topic}\n`;
  if (result.angle) text += `💡 ${result.angle}\n\n`;
  if (result.carousel?.slides) {
    text += '═══ Carousel 文案 ═══\n';
    result.carousel.slides.forEach(s => { text += `\n第${s.slide}页 [${s.role}]\n${s.title}\n${s.body||''}\n`; });
  }
  if (result.reels?.script) text += `\n═══ Reels 脚本 ═══\n${result.reels.script}\n`;
  if (result.caption) text += `\n═══ Caption ═══\n${typeof result.caption==='string'?result.caption:result.caption.caption||''}\n`;
  if (result.hashtags?.length) text += `\n═══ Hashtags ═══\n${result.hashtags.join(' ')}\n`;
  if (result.dmHook) text += `\n═══ DM 钩子 ═══\n${result.dmHook}\n`;
  copyToClipboard(text, document.getElementById('btnCopyAll'));
}

// ── Send to Carousel Generator ──
function sendToCarouselGenerator() {
  const result = window._currentResult;
  if (!result?.carousel) { showError('请先生成 Carousel 内容。'); return; }
  try {
    localStorage.setItem('instagram_carousel_prefill', JSON.stringify({
      template: result.carousel.template || 'reviewer-response',
      style: result.carousel.style || 'academic-paper',
      slides: result.carousel.slides || [],
      caption: typeof result.caption === 'string' ? result.caption : (result.caption?.caption || ''),
      hashtags: result.hashtags || [],
      cta: result.dmHook || ''
    }));
  } catch (e) { console.warn('Failed to set carousel prefill:', e); }
  window.location.href = '../ins_reviewer_carousel/';
}

// ── Export JSON ──
function exportResultAsJson() {
  const result = window._currentResult;
  if (!result) return;
  downloadFile(`instagram_content_${Date.now()}.json`, JSON.stringify(result, null, 2), 'application/json');
}

function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportTeleprompter() {
  const result = window._currentResult;
  if (!result?.reels?.script) { showError('请先生成 Reels 脚本。'); return; }
  downloadFile(`reels_script_${Date.now()}.txt`, result.reels.script, 'text/plain;charset=utf-8');
  showInfo('✅ 提词稿已下载');
}

function exportScenesJson() {
  const plan = window._currentResult?.videoPlan;
  if (!plan) { showError('请先生成视频分镜方案。'); return; }
  downloadFile(`scenes_${Date.now()}.json`, JSON.stringify(plan, null, 2), 'application/json');
  showInfo('✅ scenes.json 已下载');
}

// ── Rewrite Modal ──
function openRewritePanel() {
  const result = window._currentResult;
  if (!result) return;
  const slideSelect = document.getElementById('rewriteSlideIndex');
  if (slideSelect && result.carousel?.slides) {
    slideSelect.innerHTML = result.carousel.slides.map((s,i) =>
      `<option value="${i}">Slide ${s.slide}: ${(s.title||'').substring(0,40)}</option>`
    ).join('');
  }
  updateRewriteOriginalText();
  document.getElementById('rewriteModal').classList.add('show');
}

function closeRewritePanel() {
  document.getElementById('rewriteModal').classList.remove('show');
  document.getElementById('rewriteResult').style.display = 'none';
}

function updateRewriteOriginalText() {
  const result = window._currentResult;
  if (!result) return;
  const type = document.getElementById('rewriteContentType').value;
  let text = '';
  switch (type) {
    case 'carousel_slide':
      const idx = parseInt(document.getElementById('rewriteSlideIndex')?.value || '0');
      const slide = result.carousel?.slides?.[idx];
      text = slide ? `${slide.title}\n${slide.body||''}` : '';
      break;
    case 'reels_script': text = result.reels?.script || ''; break;
    case 'caption':
      text = typeof result.caption === 'string' ? result.caption : (result.caption?.caption || '');
      break;
    case 'dm_hook': text = result.dmHook || ''; break;
  }
  document.getElementById('rewriteOriginalText').value = text;
}

async function doRewrite() {
  const contentType = document.getElementById('rewriteContentType').value;
  const content = document.getElementById('rewriteOriginalText').value;
  const rewriteGoal = document.getElementById('rewriteGoal').value;
  const tone = document.getElementById('rewriteTone').value;
  if (!content.trim()) return;
  const btn = document.getElementById('btnDoRewrite');
  btn.disabled = true; btn.textContent = '⏳ 改写中...';
  try {
    const response = await fetch(`${API_BASE}/rewrite-instagram-content`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contentType, content, rewriteGoal, tone })
    });
    const data = await response.json();
    document.getElementById('rewriteResultText').textContent = data.rewritten || '改写失败';
    document.getElementById('rewriteResult').style.display = 'block';
  } catch (err) {
    showError('改写失败: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '✨ 改写';
  }
}

function applyRewrite() {
  const rewritten = document.getElementById('rewriteResultText').textContent;
  if (!rewritten) return;
  const type = document.getElementById('rewriteContentType').value;
  const result = window._currentResult;
  if (!result) return;
  switch (type) {
    case 'carousel_slide': {
      const idx = parseInt(document.getElementById('rewriteSlideIndex')?.value || '0');
      if (result.carousel?.slides?.[idx]) {
        const parts = rewritten.split('\n');
        result.carousel.slides[idx].title = parts[0] || result.carousel.slides[idx].title;
        result.carousel.slides[idx].body = parts.slice(1).join('\n') || result.carousel.slides[idx].body;
      }
      break;
    }
    case 'reels_script': if (result.reels) result.reels.script = rewritten; break;
    case 'caption':
      if (typeof result.caption === 'string') result.caption = rewritten;
      else if (result.caption) result.caption.caption = rewritten;
      break;
    case 'dm_hook': result.dmHook = rewritten; break;
  }
  renderResults(result);
  closeRewritePanel();
  showInfo('✅ 改写已应用');
}

async function rewriteToReduceRisk() {
  const result = window._currentResult;
  if (!result) return;
  showLoading(true);
  try {
    const response = await fetch(`${API_BASE}/rewrite-instagram-content`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contentType: 'full_package',
        content: JSON.stringify({ carousel:result.carousel, reels:result.reels, caption:result.caption, dmHook:result.dmHook, hashtags:result.hashtags }),
        rewriteGoal: 'remove_risky_language',
        tone: result.tone || 'professional'
      })
    });
    if (!response.ok) throw new Error('重写失败');
    const data = await response.json();
    try {
      const rewritten = JSON.parse(data.rewritten);
      if (rewritten.carousel) result.carousel = rewritten.carousel;
      if (rewritten.reels) result.reels = rewritten.reels;
      if (rewritten.caption) result.caption = rewritten.caption;
      if (rewritten.dmHook) result.dmHook = rewritten.dmHook;
      if (rewritten.hashtags) result.hashtags = rewritten.hashtags;
    } catch (_) { result.caption = data.rewritten; }
    renderResults(result);
    showInfo('✅ 内容已重写，风险表达已降低');
  } catch (err) {
    showError('降低风险重写失败: ' + err.message);
  } finally { showLoading(false); }
}

// ── Video Plan ──
async function generateVideoPlan() {
  const result = window._currentResult;
  if (!result?.reels?.script) { showError('请先生成 Reels 脚本。'); return; }
  const btn = document.getElementById('btnGenerateVideoPlan');
  btn.disabled = true; btn.textContent = '⏳ 生成中...';
  try {
    const response = await fetch(`${API_BASE}/generate-reels-video-plan`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ script: result.reels.script, duration: result.reels.duration || 35, template: 'paper-annotation' })
    });
    const data = await response.json();
    renderVideoPlan(data);
    window._currentResult.videoPlan = data;
  } catch (err) {
    showError('生成视频方案失败: ' + err.message);
  } finally { btn.disabled = false; btn.textContent = '🎬 生成视频分镜方案'; }
}

function renderVideoPlan(data) {
  const container = document.getElementById('videoPlanPreview');
  const video = data.video || data;
  let html = '<div class="content-block-header mt-12"><span class="block-label">🎬 视频分镜方案</span>';
  html += `<button class="btn-icon" onclick="downloadFile('scenes_${Date.now()}.json',${JSON.stringify(JSON.stringify(data,null,2))},'application/json')" title="下载 scenes.json">📥</button></div>`;
  html += `<div class="text-muted mb-8">${escapeHtml(video.size||'1080x1920')} · ${video.duration||'?'}s · ${escapeHtml(video.template||'')}</div>`;
  if (video.scenes && video.scenes.length > 0) {
    html += '<table class="shot-list-table"><thead><tr><th>#</th><th>时长</th><th>类型</th><th>画面</th><th>口播</th></tr></thead><tbody>';
    video.scenes.forEach(s => {
      html += `<tr><td>${s.index}</td><td>${s.duration}s</td><td>${escapeHtml(s.type||'')}</td><td>${escapeHtml(s.visual||'')}</td><td>${escapeHtml(s.voiceover||'')}</td></tr>`;
    });
    html += '</tbody></table>';
  }
  container.innerHTML = html;
}

// ── History ──
function saveToHistory(formData, result) {
  try {
    const history = getHistory();
    history.unshift({
      id: 'ig_' + Date.now(),
      createdAt: new Date().toISOString(),
      sourceType: formData.sourceType,
      sourceText: formData.sourceText.substring(0, 200),
      topic: result.topic || '',
      result: result
    });
    if (history.length > MAX_HISTORY) history.length = MAX_HISTORY;
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  } catch (e) { console.warn('Failed to save history:', e); }
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch (_) { return []; }
}

function renderHistory() {
  const container = document.getElementById('historyList');
  if (!container) return;
  const searchTerm = (document.getElementById('historySearch')?.value || '').toLowerCase();
  let history = getHistory();
  if (searchTerm) {
    history = history.filter(item =>
      (item.topic||'').toLowerCase().includes(searchTerm) ||
      (item.sourceText||'').toLowerCase().includes(searchTerm) ||
      (item.sourceType||'').toLowerCase().includes(searchTerm)
    );
  }
  if (history.length === 0) {
    container.innerHTML = `<div class="empty-hint">${searchTerm ? '无匹配记录' : '暂无历史记录'}</div>`;
    return;
  }
  container.innerHTML = history.slice(0, 10).map((item, i) => `
    <div class="history-item">
      <div class="history-item-main">
        <span class="history-time">${formatTime(item.createdAt)}</span>
        <span class="history-topic">${escapeHtml(item.topic || '未命名')}</span>
        <span class="history-type">${escapeHtml(item.sourceType)}</span>
      </div>
      <div class="history-item-actions">
        <button class="btn secondary btn-sm" onclick="restoreHistory(${i})">📋 恢复</button>
        <button class="btn ghost btn-sm" onclick="deleteHistoryItem(${i})">🗑️</button>
      </div>
    </div>
  `).join('');
}

function restoreHistory(index) {
  const history = getHistory();
  const item = history[index];
  if (!item?.result) return;
  window._currentResult = item.result;
  renderResults(item.result);
  document.getElementById('resultPanel')?.scrollIntoView({ behavior: 'smooth' });
}

function deleteHistoryItem(index) {
  try {
    const history = getHistory();
    history.splice(index, 1);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch (e) { console.warn('Failed to delete history item:', e); }
  renderHistory();
}

function clearAllHistory() {
  if (!confirm('确定清空所有历史记录？此操作不可恢复。')) return;
  try {
    localStorage.removeItem(HISTORY_KEY);
  } catch (e) { console.warn('Failed to clear history:', e); }
  renderHistory();
}

function formatTime(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Reddit Radar Prefill ──
function checkRedditRadarPrefill() {
  try {
    const prefillStr = localStorage.getItem('instagram_content_prefill');
    if (!prefillStr) return;
    const p = JSON.parse(prefillStr);
    localStorage.removeItem('instagram_content_prefill');
    if (p.sourceType) document.getElementById('sourceType').value = p.sourceType;
    if (p.sourceText) document.getElementById('sourceText').value = p.sourceText;
    if (p.audience) document.getElementById('audience').value = p.audience;
    if (p.goal) document.getElementById('goal').value = p.goal;
    if (p.painPoint) document.getElementById('painPoint').value = p.painPoint;
    if (p.tone) document.getElementById('tone').value = p.tone;
    if (p.ctaLevel) document.getElementById('ctaLevel').value = p.ctaLevel;
    showInfo('📡 已从 Reddit Radar 带入线索，请确认信息后点击生成。');
  } catch (e) { console.warn('Failed to load Reddit Radar prefill:', e); }
}

// ── Helpers ──
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function debounce(fn, delay) {
  let timer;
  return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), delay); };
}
