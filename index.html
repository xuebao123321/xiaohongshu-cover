<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书大字封面生成器 v3.0</title>
<meta name="description" content="基于 192 张稿定设计真实样本蒸馏,5 大风格族,程序化生成 1242×1656 小红书封面。">
<style>
/*
 * ═══════════════════════════════════════════════════════════════════
 *  小红书大字封面生成器 v3.0
 *  ────────────────────────────────────────────────
 *  数据底片: 192 张稿定设计真实样本视觉评审
 *  风格族  : A 手绘便签 / B 拼贴 / C 漫画 pop / D 报纸大字 / E 极简大字
 *  字体    : 8 类(衬线 / 黑体 / 马克笔 / 卡通 / 草书 / 小薇 / 手写 / 快乐)
 *  渲染    : Canvas 2D → PNG(1242×1656, 3:4)
 *  ────────────────────────────────────────────────
 *  本文件结构:
 *    1. <head>  : 字体 + CSS 样式 + 响应式断点
 *    2. <body>  : Header / Tabs(风格族+字体) / 输入区 / 卡片网格
 *    3. <script>: ES Module 导入 features.js + colors.js
 *               主流程:generate / rerollOne / rerollAll / downloadCanvas / copyCanvas
 *               5 大风格族函数:styleA_handDrawn ~ styleE_minimal
 *  ═══════════════════════════════════════════════════════════════════
 */

/* ═══════════ 字体加载 — 8 类 ═══════════ */
@import url('https://fonts.font.im/css2?family=Noto+Serif+SC:wght@700&family=Noto+Sans+SC:wght@900&family=Liu+Jian+Mao+Cao&family=ZCOOL+XiaoWei&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&family=DM+Serif+Display&family=Permanent+Marker&display=swap');

/* ═══════════ 重置 ═══════════ */
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:"Noto Serif SC","PingFang SC","Microsoft YaHei",serif;
  background:#f7f5f2;
  padding:24px 20px 60px;
  color:#2d2a26;
  line-height:1.5;
  min-height:100vh;
}
button{font-family:inherit}

/* ═══════════ Header ═══════════ */
.header{text-align:center;margin-bottom:18px;max-width:900px;margin-left:auto;margin-right:auto}
.header h1{
  font-family:"DM Serif Display","Noto Serif SC",serif;
  font-size:30px;font-weight:400;color:#1a1a1a;
  letter-spacing:.5px;font-style:italic;margin-bottom:6px;
}
.header p{color:#8a8a8a;font-size:13px;letter-spacing:2px;margin-bottom:4px}
.header .badge{
  display:inline-block;margin-top:8px;padding:4px 12px;
  background:#fff;border:1px solid #e8e4df;border-radius:20px;
  font-size:11px;color:#a8a098;letter-spacing:.5px;
}

/* ═══════════ Tabs(风格族 / 字体)═══════════ */
.tabs{display:flex;justify-content:center;gap:6px;margin:14px 0;flex-wrap:wrap}
.tab{
  padding:6px 14px;border:1.5px solid #e8e4df;background:#fff;
  border-radius:14px;font-size:12px;color:#5a5a5a;cursor:pointer;
  transition:all .2s;letter-spacing:.5px;
  user-select:none;-webkit-user-select:none;
}
.tab:hover{border-color:#a8a098;color:#2d2a26}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.tab .ico{margin-right:4px;font-size:13px}

.tab-group{margin:18px auto;max-width:760px;padding:14px 18px;background:#fff;border:1px solid #e8e4df;border-radius:12px}
.tab-group .label{
  font-size:11px;color:#8a8a8a;letter-spacing:2px;
  margin-bottom:8px;font-family:"Noto Sans SC",sans-serif;font-weight:600;
}

/* ═══════════ 输入区 ═══════════ */
.input-row{
  max-width:760px;margin:0 auto 18px;display:flex;gap:10px;align-items:stretch;
}
.input-row textarea{
  flex:1;min-width:0;height:100px;padding:14px 16px;
  border:1.5px solid #e8e4df;border-radius:10px;
  font-size:16px;font-family:inherit;outline:none;
  resize:vertical;line-height:1.6;
  transition:border .2s;background:#fff;color:#2d2a26;
}
.input-row textarea:focus{border-color:#5a8cb8}
.input-row textarea::placeholder{color:#c0bbb0}
.input-row .btn-wrap{display:flex;flex-direction:column;gap:8px;min-width:140px}
.btn{
  padding:10px 18px;background:#1a1a1a;color:#fff;border:none;
  border-radius:10px;font-size:13px;font-weight:500;
  cursor:pointer;white-space:nowrap;letter-spacing:2px;
  transition:background .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn:hover{background:#3a3a3a}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn.primary{background:#ED0108}
.btn.primary:hover{background:#c10106}
.btn.outline{background:#fff;color:#1a1a1a;border:1.5px solid #1a1a1a;font-weight:700}
.btn.outline:hover{background:#1a1a1a;color:#fff}
.btn.small{padding:5px 10px;font-size:11px;letter-spacing:1px}

/* ═══════════ 字符计数 ═══════════ */
.counter{text-align:center;color:#a8a098;font-size:12px;margin-bottom:14px;letter-spacing:1px;min-height:18px}
.counter.warn{color:#ED0108}

/* ═══════════ Section 标签 ═══════════ */
.section-label{
  max-width:1500px;margin:24px auto 14px;padding:14px 20px;
  background:#fff;border-radius:10px;border:1.5px solid #e8e4df;
  display:flex;align-items:center;gap:14px;
  font-size:16px;font-weight:600;color:#2d2a26;letter-spacing:1px;
  font-family:"DM Serif Display","Noto Serif SC",serif;font-style:italic;
}
.section-label::after{content:'';flex:1;height:1px;background:#e8e4df}
.section-num{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:30px;height:30px;padding:0 6px;background:#1a1a1a;color:#fff;
  border-radius:50%;font-size:13px;font-weight:700;font-style:normal;
  font-family:"Noto Sans SC","PingFang SC",sans-serif;
}
.section-desc{
  font-size:12px;color:#a8a098;font-weight:400;font-style:normal;
  letter-spacing:.5px;font-family:"Noto Sans SC","PingFang SC",sans-serif;
}
.s-tag{
  display:inline-block;padding:3px 9px;border-radius:4px;
  font-size:11px;font-weight:500;background:#f0ebe5;color:#7a7a7a;
  letter-spacing:1px;font-style:normal;
  font-family:"Noto Sans SC","PingFang SC",sans-serif;
}

/*
 * ═══════════ Grid + 卡片 ═══════════
 *
 * 卡片实现策略:
 *   - 实际渲染画布:1242×1656(小红书标准 3:4)
 *   - DOM 显示缩略图:CSS aspect-ratio: 3/4 + canvas width:100%
 *   - canvas 内部像素保持 1242×1656,显示时由浏览器自动缩放
 *   - 这样做的好处:下载的 PNG 始终是高清原图,不受屏幕 DPR 影响
 *
 * 卡片悬浮效果:
 *   - transform:translateY(-2px) — 轻微抬起
 *   - box-shadow 增强 — 营造悬浮感
 *   - actions 三按钮(⬇下载 / 📋复制 / ↻换一换)hover 时 fade in
 */
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:14px;max-width:1500px;margin:0 auto 22px;
}
.card-wrap{
  position:relative;aspect-ratio:3/4;border-radius:10px;overflow:hidden;
  background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.05);
  transition:transform .25s,box-shadow .25s;cursor:pointer;
}
.card-wrap:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.10)}
.card-wrap:active{transform:scale(.98)}
.card-wrap canvas{display:block;width:100%;height:100%;border-radius:10px}
.actions{
  position:absolute;bottom:6px;right:6px;display:flex;gap:4px;
  z-index:9;opacity:0;transition:opacity .2s;
}
.card-wrap:hover .actions{opacity:1}
.act-btn{
  background:rgba(0,0,0,.4);color:#fff;border:none;
  padding:6px 9px;border-radius:6px;font-size:13px;cursor:pointer;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  transition:background .2s,transform .6s cubic-bezier(.4,0,.2,1);
  line-height:1;
}
.act-btn:hover{background:rgba(0,0,0,.7)}
.act-btn.spin:hover{transform:rotate(180deg)}
.act-btn:disabled{opacity:.5;cursor:not-allowed}

/* ═══════════ 空状态 ═══════════ */
.empty-state{
  text-align:center;padding:80px 20px 60px;max-width:520px;margin:0 auto;
  background:#fff;border-radius:14px;border:1px dashed #d8d4cf;
}
.empty-icon{font-size:60px;margin-bottom:14px;opacity:.55}
.empty-title{font-size:18px;color:#2d2a26;font-weight:600;margin-bottom:6px;letter-spacing:1px}
.empty-desc{font-size:13px;color:#a8a098;letter-spacing:.5px;line-height:1.7}

/* ═══════════ 加载 + Toast ═══════════ */
.loading{
  text-align:center;padding:60px 20px;color:#8a8a8a;font-size:14px;
  letter-spacing:1px;
}
.loading::after{
  content:'';display:inline-block;width:14px;height:14px;
  margin-left:8px;border:2px solid #d8d4cf;border-top-color:#1a1a1a;
  border-radius:50%;animation:spin .8s linear infinite;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);
  padding:10px 22px;background:rgba(0,0,0,.85);color:#fff;
  border-radius:24px;font-size:13px;letter-spacing:1px;
  z-index:9999;transition:transform .3s;backdrop-filter:blur(8px);
  pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ═══════════ 响应式 — mobile-first ═══════════ */
/* ═══════════ 响应式 — mobile-first(批次 5 优化 480px 断点 + 触摸目标)═══════════ */

/* 超小屏 ≤ 480px: 单列布局(批次 5 要求) */
@media (max-width:480px){
  body{padding:12px 10px 32px}
  .header h1{font-size:20px}
  .header p{font-size:10px;letter-spacing:1.2px}
  .header .badge{font-size:10px;padding:3px 8px}
  .tab{padding:6px 9px;font-size:10px;min-height:32px}
  .input-row{flex-direction:column;gap:8px}
  .input-row .btn-wrap{flex-direction:row;gap:6px;min-width:auto}
  .input-row textarea{height:70px;font-size:14px;padding:10px 12px}
  /* 触摸目标 ≥ 44×44px (批次 5 要求) */
  .btn{padding:12px 16px;font-size:13px;min-height:44px}
  .grid{grid-template-columns:1fr;gap:10px}
  .section-label{padding:8px 12px;font-size:12px;margin:14px auto 8px}
  .section-num{min-width:22px;height:22px;font-size:10px}
  .section-desc,.s-tag{font-size:9px}
  .empty-state{padding:36px 16px 28px}
  .empty-icon{font-size:40px}
  .empty-title{font-size:14px}
  .empty-desc{font-size:11px}
  /* 触摸设备:长按 0.5s 触发下载,actions 按钮常驻 */
  .actions{opacity:1 !important;bottom:8px;right:8px}
  .act-btn{padding:10px 14px;font-size:16px;min-width:44px;min-height:44px}
}

@media (max-width:767px){
  body{padding:14px 12px 40px}
  .header h1{font-size:22px}
  .header p{font-size:11px;letter-spacing:1.5px}
  .tab{padding:5px 10px;font-size:11px}
  .input-row{flex-direction:column;gap:10px}
  .input-row .btn-wrap{flex-direction:row;min-width:auto}
  .input-row textarea{height:80px;font-size:15px}
  .btn{padding:9px 14px;font-size:12px}
  .grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .section-label{flex-wrap:wrap;gap:8px;padding:10px 14px;font-size:13px;margin:18px auto 10px}
  .section-num{min-width:24px;height:24px;font-size:11px}
  .section-desc,.s-tag{font-size:10px}
  .empty-state{padding:50px 20px 40px}
  .empty-icon{font-size:48px}
  .empty-title{font-size:16px}
  .empty-desc{font-size:12px}
  .tab-group{padding:10px 12px}
}

@media (min-width:768px) and (max-width:1023px){
  body{padding:18px}
  .grid{grid-template-columns:repeat(3,1fr);gap:12px}
  .section-label{font-size:15px}
}

@media (min-width:1024px){
  .input-row{max-width:760px}
  .grid{grid-template-columns:repeat(5,1fr);gap:16px}
}
</style>
</head>
<body>

<!-- ═══════════ Toast 容器 ═══════════ -->
<div class="toast" id="toast"></div>

<!-- ═══════════ Header ═══════════ -->
<div class="header">
  <h1>Notes Cover Studio</h1>
  <p>小 红 书 大 字 封 面 生 成 器 · 5 大 风 格 族 · 30 张 模 板</p>
  <div class="badge">💡 基于 192 张稿定设计真实样本蒸馏 · v3.0</div>
</div>

<!-- ═══════════ 风格族勾选 ═══════════ -->
<div class="tab-group">
  <div class="label">风 格 族(可勾选启用哪些,默认全选)</div>
  <div class="tabs" id="familyTabs">
    <button class="tab active" data-family="A">🅰️ 手绘便签</button>
    <button class="tab active" data-family="B">🅱️ 拼贴 collage</button>
    <button class="tab active" data-family="C">🅲 漫画 pop</button>
    <button class="tab active" data-family="D">🅳 报纸大字</button>
    <button class="tab active" data-family="E">🅴 极简大字</button>
  </div>
</div>

<!-- ═══════════ 字体切换 ═══════════ -->
<div class="tab-group">
  <div class="label">字 体(全局切换)</div>
  <div class="tabs" id="fontTabs">
    <button class="tab active" data-font="black">黑体</button>
    <button class="tab" data-font="serif">宋体</button>
    <button class="tab" data-font="marker">马克笔</button>
    <button class="tab" data-font="qingke">卡通</button>
    <button class="tab" data-font="cao">草书</button>
    <button class="tab" data-font="xiaowei">小薇</button>
    <button class="tab" data-font="mashan">手写</button>
    <button class="tab" data-font="kuai">快乐</button>
  </div>
</div>

<!-- ═══════════ 输入区 ═══════════ -->
<div class="input-row">
  <textarea
    id="textInput"
    placeholder="输入文案,1-30 字最佳&#10;支持换行 · 自动适配字号 · 关键词感应风格"
    maxlength="30"
    aria-label="封面文案输入"></textarea>
  <div class="btn-wrap">
    <button class="btn primary" id="btnGenerate">🎨 生成 30 张</button>
    <button class="btn outline" id="btnRerollAll">🎲 全部换一换</button>
  </div>
</div>
<div class="counter" id="counter">0 / 30 字</div>

<!-- ═══════════ 卡片网格 ═══════════ -->
<div id="container">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📱</div>
    <div class="empty-title">输入文案,生成小红书封面</div>
    <div class="empty-desc">
      5 大风格族 · 6 套配色 · 8 类字体<br>
      字数自适应 · 装饰互斥 · Canvas 直出 1242×1656
    </div>
  </div>
</div>

<!-- ═══════════ html2canvas 备份方案 ═══════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- ═══════════ 主程序 ES Module ═══════════ -->
<script type="module">
import {
  drawHandDrawnCircle,
  drawCloudHighlight,
  drawNotebookPaper,
  drawHalftone,
  drawSpeechBubble,
  drawHighlighter,
  drawTornNote,
  drawStamp,
  drawEmojiSticker,
  drawComicBurst,
  drawMarkerText,
  drawStickerCharacter,
} from './lib/features.js';
import {
  PALETTES,
  ensureContrast,
  hexToRgb,
  withAlpha,
  pickBlock,
} from './lib/colors.js';

// ═══════════ 全局配置 ═══════════
const CANVAS_W = 1242;   // 3:4 标准小红书尺寸
const CANVAS_H = 1656;
const CARDS_PER_FAMILY = 6;  // 每风格族 6 张

// 8 类字体配置
const FONT_MAP = {
  black:    { name: '黑体',     family: '"Noto Sans SC","PingFang SC",sans-serif',         weight: 900, scale: 1.00 },
  serif:    { name: '宋体',     family: '"Noto Serif SC","Songti SC",serif',               weight: 700, scale: 1.00 },
  marker:   { name: '马克笔',   family: '"Permanent Marker","Noto Sans SC",cursive',       weight: 400, scale: 1.15 },
  qingke:   { name: '卡通',     family: '"ZCOOL QingKe HuangYou","Noto Sans SC",sans-serif', weight: 400, scale: 1.05 },
  cao:      { name: '草书',     family: '"Liu Jian Mao Cao","Noto Serif SC",cursive',      weight: 400, scale: 1.18 },
  xiaowei:  { name: '小薇',     family: '"ZCOOL XiaoWei","Noto Serif SC",serif',           weight: 400, scale: 1.10 },
  mashan:   { name: '手写',     family: '"Ma Shan Zheng","Noto Serif SC",cursive',         weight: 400, scale: 1.15 },
  kuai:     { name: '快乐',     family: '"ZCOOL KuaiLe","Noto Sans SC",cursive',           weight: 400, scale: 1.08 },
};

// 5 大风格族元信息
const FAMILY_LABELS = {
  A: { name: '手绘便签',      tag: '米黄方格 · 手绘圈 · 马克笔',      desc: '笔记本/便签/手账感' },
  B: { name: '拼贴 collage',  tag: '撕边便签 · 多色块 · 印章',        desc: '拼贴/手账/复古风' },
  C: { name: '漫画 pop',      tag: '半色调 · 对话气泡 · 放射线',      desc: '漫画/波普/冲击感' },
  D: { name: '报纸大字',      tag: '纯色块 · 描边粗体 · 印章',        desc: '杂志/报纸/大字' },
  E: { name: '极简大字',      tag: '整块纯色 · 干净黑体 · ≤1 装饰',   desc: '极简/高级/冷淡' },
};

// 风格族 -> PALETTES key 映射
const FAMILY_TO_PALETTE = {
  A: 'handDrawn',
  B: 'collage',
  C: 'comicPop',
  D: 'newspaper',
  E: 'minimal',
};

// 全局状态
const STATE = {
  text: '',
  font: 'black',
  families: new Set(['A','B','C','D','E']),
  seed: 0,
  activeCount: 0,
};

// 暴露给调试
window.STATE = STATE;
window.FONT_MAP = FONT_MAP;
window.FAMILY_LABELS = FAMILY_LABELS;

// ═══════════ 字号自适应算法 — 4 档(批次 5 改造)══════════
/*
 * 字号自适应 4 档(v3.0 STYLE_GUIDE §4.1 + §6.1):
 *   1-4  字: 字号 ≈ canvas_height * 0.18, 撑满画面 60-70%
 *   5-9  字: 字号 ≈ canvas_height * 0.13, 撑满画面 50-60%
 *   10-15 字: 字号 ≈ canvas_height * 0.09, 撑满画面 40-50%
 *   16-30 字: 字号 ≈ canvas_height * 0.06, 撑满画面 30-40%
 *
 * 强制约束:
 *   - 文字块最大宽度 = canvas_width * 0.85(超出降字号)
 *   - 单字宽度:CJK=1em, EN/空格=0.55em, 数字=0.6em, 其他符号=0.5em
 *   - 字体视觉补偿:草书/小薇/手写 视觉偏小 → 放大 1.05-1.18 倍
 *
 * @param {string} t - 文本(支持 \n 显式换行)
 * @param {number} mw - 可用宽度(像素)
 * @param {number} mh - 可用高度(像素)
 * @param {number} [mn] - 最小字号(默认 18)
 * @param {number} [mx] - 最大字号(默认 96)
 * @param {number} [fontScale] - 字体视觉补偿(默认 1)
 * @returns {number} 字号(像素)
 */
function fs(t, mw, mh, mn, mx, fontScale) {
  mn = mn || 18;
  mx = mx || 96;
  fontScale = fontScale || 1;

  // 1. 计算有效字符数(剔除空白/换行)
  const effective = t.replace(/[\s\n]/g, '').length;
  const rawLines = t.split('\n').filter((l) => l.length > 0);
  const lineCount = Math.max(1, rawLines.length);

  // 2. 按字数分档确定基础字号(对应画面高度比例)
  let baseH;
  if (effective <= 4)       baseH = 0.18;  // 1-4 字
  else if (effective <= 9)  baseH = 0.13;  // 5-9 字
  else if (effective <= 15) baseH = 0.09;  // 10-15 字
  else                       baseH = 0.06;  // 16-30 字

  // 3. 单行宽度估算(em 单位)
  function lineW(s) {
    let w = 0;
    for (let i = 0; i < s.length; i++) {
      const c = s.charCodeAt(i);
      if ((c >= 0x4e00 && c <= 0x9fff) || (c >= 0x3400 && c <= 0x4dbf)
        || (c >= 0xf900 && c <= 0xfaff) || (c >= 0x3000 && c <= 0x303f)) {
        w += 1;
      } else if (c >= 0x30 && c <= 0x39) {
        w += 0.6;
      } else if ((c >= 0x41 && c <= 0x7a) || c === 0x20) {
        w += 0.55;
      } else {
        w += 0.5;
      }
    }
    return w;
  }
  let maxLineW = 0;
  for (const l of rawLines) {
    const w = lineW(l);
    if (w > maxLineW) maxLineW = w;
  }
  if (maxLineW === 0) maxLineW = 1;

  // 4. 由可用高度推出基础字号
  const lineH = 1.25;
  let rH = Math.floor((mh * 0.92) / (lineCount * lineH));

  // 5. 由可用宽度推出约束字号
  // 强制约束:文字块最大宽度 = mw * 0.85(超出降字号)
  const maxBlockW = mw * 0.85;
  let rW = Math.floor(maxBlockW / maxLineW);

  // 6. 取较小者,加字体补偿
  let r = Math.min(rH, rW);

  // 7. 兜底用 baseH(画面比例基础值)
  if (r < baseH * 1500) r = Math.floor(baseH * 1500);  // 1500 接近标准画布高度

  r = Math.floor(r * fontScale);

  return Math.max(mn, Math.min(mx, r));
}

/**
 * 在 ctx 上绘制多行文字(支持自动换行、对齐、描边)。
 * @param {CanvasRenderingContext2D} ctx
 * @param {string} text - 文字内容(支持 \n)
 * @param {number} x - 锚点 X(align=center 时为水平中心,left 时为左边界)
 * @param {number} y - 锚点 Y(vAlign=middle 时为垂直中心)
 * @param {number} maxW - 最大宽度(超过自动换行)
 * @param {number} fontSize - 字号
 * @param {string} color - 文字色
 * @param {object} [opts] - { align, vAlign, lineHeight, fontFamily, fontWeight, stroke:{color,width} }
 * @returns {{width:number,height:number,lines:number}}
 */
function drawWrappedText(ctx, text, x, y, maxW, fontSize, color, opts) {
  opts = opts || {};
  const align = opts.align || 'center';
  const vAlign = opts.vAlign || 'middle';
  const lineHeight = opts.lineHeight || 1.25;
  const fontFamily = opts.fontFamily || '"Noto Sans SC",sans-serif';
  const fontWeight = opts.fontWeight || 900;
  const stroke = opts.stroke;
  ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
  ctx.textBaseline = 'top';
  const rawLines = text.split('\n');
  // 自动换行(中文按字拆)
  const wrapped = [];
  for (const ln of rawLines) {
    let cur = '';
    for (const ch of ln) {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxW && cur) {
        wrapped.push(cur);
        cur = ch;
      } else {
        cur = test;
      }
    }
    if (cur) wrapped.push(cur);
  }
  const totalH = wrapped.length * fontSize * lineHeight;
  let startY;
  if (vAlign === 'top') startY = y;
  else if (vAlign === 'bottom') startY = y - totalH;
  else startY = y - totalH / 2;
  wrapped.forEach((ln, i) => {
    let dx;
    if (align === 'left') dx = x;
    else if (align === 'right') dx = x - ctx.measureText(ln).width;
    else dx = x - ctx.measureText(ln).width / 2;
    const dy = startY + i * fontSize * lineHeight;
    if (stroke) {
      ctx.lineWidth = stroke.width || 4;
      ctx.strokeStyle = stroke.color || '#000000';
      ctx.lineJoin = 'round';
      ctx.miterLimit = 2;
      ctx.strokeText(ln, dx, dy);
    }
    ctx.fillStyle = color;
    ctx.fillText(ln, dx, dy);
  });
  return { width: maxW, height: totalH, lines: wrapped.length };
}

/**
 * 确定性伪随机(由 seed 决定结果,保证每次换一换可复现)
 * @param {number} seed
 * @returns {number} 0-1
 */
function rand(seed) {
  const x = Math.sin(seed * 9999 + 137) * 10000;
  return x - Math.floor(x);
}
/**
 * 按 seed 从数组中选一个
 */
function pick(arr, seed) {
  return arr[Math.floor(rand(seed) * arr.length)];
}

// ════════════════════════════════════════════════════════════════
// ═══════════ 风格族 A · 手绘便签风 ═══════════
// ════════════════════════════════════════════════════════════════

/**
 * 风格族 A 渲染函数
 * @param {CanvasRenderingContext2D} ctx
 * @param {string} text - 文案
 * @param {object} palette - handDrawn 风格配色
 * @param {object} options - { seed }
 */
function styleA_handDrawn(ctx, text, palette, options) {
  const W = CANVAS_W, H = CANVAS_H;
  const seed = (options && options.seed) || 1;
  const fontConf = FONT_MAP[STATE.font] || FONT_MAP.black;
  const t = (text || '今日份好物').slice(0, 30);

  // ─── 1. 底色 ───
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);

  // ─── 2. 方格纸背景(横向+纵向细线) ───
  drawNotebookPaper(ctx, W, H, 'grid');

  // ─── 3. 顶部胶带(手账风招牌) ───
  const tapeRotations = [-3, 2, -2, 3, -3, 2];
  const tapeRot = tapeRotations[seed % 6];
  ctx.save();
  ctx.translate(W / 2, 22);
  ctx.rotate(tapeRot * Math.PI / 180);
  // 胶带阴影
  ctx.fillStyle = withAlpha('#000000', 0.08);
  ctx.fillRect(-95, -14, 190, 36);
  // 胶带主体
  ctx.fillStyle = withAlpha(palette.accent, 0.82);
  ctx.fillRect(-95, -18, 190, 36);
  // 胶带顶边高光
  ctx.fillStyle = withAlpha('#FFFFFF', 0.18);
  ctx.fillRect(-95, -18, 190, 4);
  ctx.restore();

  // ─── 4. 主标题(马克笔风 + 黑色超粗体) ───
  const fontSize = fs(t, W * 0.78, H * 0.40, 72, 260, fontConf.scale);
  drawMarkerText(ctx, t, W * 0.5 - measureTextWidth(ctx, t, fontSize, fontConf.family, fontConf.weight) / 2,
                 H * 0.46 - fontSize / 2, fontSize, palette.text);

  // ─── 5. 手绘圈线(圈住首字或关键词) ───
  const circleW = fontSize * 1.4;
  const circleH = fontSize * 1.0;
  drawHandDrawnCircle(ctx, W * 0.22, H * 0.36, circleW, circleH, palette.primary, 6);

  // ─── 6. 云朵高光(标题左上角柔光) ───
  drawCloudHighlight(ctx, W * 0.05, H * 0.18, W * 0.3, H * 0.12, '#FFFFFF', 0.55);

  // ─── 7. 荧光笔高亮(横线标题下) ───
  drawHighlighter(ctx, W * 0.12, H * 0.58, W * 0.55, 32, palette.accent);

  // ─── 8. 卡通贴纸(右下,6 种轮换) ───
  const charTypes = ['cat-megaphone', 'thumbs-up', 'sparkle', 'crown', 'lightning', 'alarm-clock'];
  const charType = charTypes[seed % 6];
  ctx.save();
  ctx.translate(W * 0.76, H * 0.78);
  ctx.scale(2.2, 2.2);
  drawStickerCharacter(ctx, charType, -40, -40, 80);
  ctx.restore();

  // ─── 9. 角落 emoji(自然/食物) ───
  const emojis = ['✨','🍃','🌿','🌱','🍀','☘️'];
  drawEmojiSticker(ctx, W * 0.86, H * 0.16, 110, emojis[seed % emojis.length]);

  // ─── 10. 底部横线 + 小贴纸 ───
  ctx.strokeStyle = withAlpha(palette.secondary, 0.45);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W * 0.1, H * 0.92);
  ctx.lineTo(W * 0.9, H * 0.92);
  ctx.stroke();

  // 角落手写日期/编号贴纸
  ctx.save();
  ctx.translate(W * 0.12, H * 0.86);
  ctx.rotate(-8 * Math.PI / 180);
  ctx.fillStyle = palette.accent;
  ctx.fillRect(0, 0, 150, 50);
  // 内描边
  ctx.strokeStyle = withAlpha(palette.primary, 0.4);
  ctx.lineWidth = 1.5;
  ctx.strokeRect(0, 0, 150, 50);
  ctx.fillStyle = palette.text;
  ctx.font = `700 30px ${fontConf.family}`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText('NOTE 0' + ((seed % 6) + 1), 75, 27);
  ctx.restore();

  // ─── 11. 装饰小图案(底部右侧几何) ───
  ctx.save();
  ctx.translate(W * 0.92, H * 0.5);
  ctx.rotate(15 * Math.PI / 180);
  ctx.strokeStyle = palette.primary;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  // ─── 12. 内侧装饰便签(左下小贴纸) ───
  ctx.save();
  ctx.translate(W * 0.18, H * 0.7);
  ctx.rotate(6 * Math.PI / 180);
  ctx.fillStyle = palette.accent;
  ctx.fillRect(-40, -18, 80, 36);
  ctx.fillStyle = palette.text;
  ctx.font = `700 22px ${fontConf.family}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('已读 ✓', 0, 0);
  ctx.restore();

  // ─── 13. 顶部分隔线 ───
  ctx.strokeStyle = withAlpha(palette.primary, 0.3);
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(W * 0.1, H * 0.13);
  ctx.lineTo(W * 0.9, H * 0.13);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.save();
  ctx.translate(W * 0.92, H * 0.5);
  ctx.rotate(15 * Math.PI / 180);
  ctx.strokeStyle = palette.primary;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// 文字宽度估算(用于居中定位)
function measureTextWidth(ctx, text, fontSize, family, weight) {
  ctx.save();
  ctx.font = `${weight} ${fontSize}px ${family}`;
  const w = ctx.measureText(text).width;
  ctx.restore();
  return w;
}

// ════════════════════════════════════════════════════════════════
// ═══════════ 风格族 B · 拼贴 collage 风 ═══════════
// ════════════════════════════════════════════════════════════════

/**
 * 风格族 B 渲染函数
 * @param {CanvasRenderingContext2D} ctx
 * @param {string} text
 * @param {object} palette - collage 配色
 * @param {object} options
 */
function styleB_collage(ctx, text, palette, options) {
  const W = CANVAS_W, H = CANVAS_H;
  const seed = (options && options.seed) || 1;
  const fontConf = FONT_MAP[STATE.font] || FONT_MAP.black;
  const t = (text || '好物推荐').slice(0, 30);

  // ─── 1. 底色 ───
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);

  // ─── 2. 轻微半色调(右上角装饰区) ───
  drawHalftone(ctx, W * 0.62, -H * 0.05, W * 0.4, H * 0.3, palette.secondary || '#000000', 0.22);

  // ─── 3. 多张撕边便签叠加(2-3 张,不同旋转) ───
  // 便签 1:左上大
  ctx.save();
  ctx.translate(W * 0.34, H * 0.32);
  ctx.rotate(-6 * Math.PI / 180);
  drawTornNote(ctx, -W * 0.28, -H * 0.18, W * 0.56, H * 0.36, palette.primary);
  ctx.restore();

  // 便签 2:中间,旋转
  ctx.save();
  ctx.translate(W * 0.55, H * 0.6);
  ctx.rotate(5 * Math.PI / 180);
  drawTornNote(ctx, -W * 0.28, -H * 0.22, W * 0.56, H * 0.44, palette.accent);
  ctx.restore();

  // 便签 3:左下窄长条
  ctx.save();
  ctx.translate(W * 0.42, H * 0.82);
  ctx.rotate(-2 * Math.PI / 180);
  drawTornNote(ctx, -W * 0.32, -H * 0.13, W * 0.64, H * 0.26, palette.secondary || '#FFE082');
  ctx.restore();

  // ─── 4. 荧光笔高亮(标题下) ───
  drawHighlighter(ctx, W * 0.2, H * 0.52, W * 0.6, 80, palette.accent);

  // ─── 5. 主标题(压在最上层便签上) ───
  const fontSize = fs(t, W * 0.6, H * 0.24, 64, 200, fontConf.scale);
  drawWrappedText(ctx, t, W / 2, H * 0.55, W * 0.6, fontSize, palette.text, {
    align: 'center', vAlign: 'middle', lineHeight: 1.18,
    fontFamily: fontConf.family, fontWeight: fontConf.weight,
    stroke: { color: '#FFFFFF', width: 6 },
  });

  // ─── 6. 印章(右上角,倾斜) ───
  const stampTexts = ['NEW','TOP','HOT','BEST','YES','FAV'];
  drawStamp(ctx, W * 0.88, H * 0.13, 140, 140, stampTexts[seed % 6], palette.stamp, -12 * Math.PI / 180);

  // ─── 7. 大 emoji(左下) ───
  const bigEmojis = ['🔥','✨','💯','🎉','⭐','🌟'];
  drawEmojiSticker(ctx, W * 0.15, H * 0.85, 170, bigEmojis[seed % bigEmojis.length]);

  // ─── 8. 箭头标注(手绘) ───
  ctx.save();
  ctx.translate(W * 0.4, H * 0.87);
  ctx.rotate(-15 * Math.PI / 180);
  ctx.strokeStyle = palette.stamp;
  ctx.fillStyle = palette.stamp;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(80, -40, 160, -15);
  ctx.stroke();
  // 箭头
  ctx.beginPath();
  ctx.moveTo(160, -15);
  ctx.lineTo(146, -32);
  ctx.lineTo(146, -2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // ─── 9. 色块散布(3 个不规则) ───
  const blockColors = palette.blocks || [palette.accent, palette.stamp, palette.primary];
  const blockSpecs = [
    { x: 0.84, y: 0.42, w: 70, h: 70, rot: 18 },
    { x: 0.05, y: 0.45, w: 60, h: 60, rot: -10 },
    { x: 0.78, y: 0.78, w: 55, h: 55, rot: 25 },
  ];
  for (let i = 0; i < blockSpecs.length; i++) {
    const b = blockSpecs[i];
    ctx.save();
    ctx.translate(W * b.x + b.w / 2, H * b.y + b.h / 2);
    ctx.rotate(b.rot * Math.PI / 180);
    ctx.fillStyle = blockColors[(seed + i) % blockColors.length];
    ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
    ctx.restore();
  }

  // ─── 10. 角落小标签(手写 NO.xx) ───
  ctx.save();
  ctx.translate(W * 0.06, H * 0.08);
  ctx.rotate(-4 * Math.PI / 180);
  ctx.fillStyle = palette.text;
  ctx.font = `700 30px ${fontConf.family}`;
  ctx.fillText('NO.0' + ((seed % 6) + 1), 0, 0);
  ctx.restore();

  // ─── 11. 撕边便签上小字(可选) ───
  if (t.length <= 4) {
    ctx.save();
    ctx.translate(W * 0.5, H * 0.18);
    ctx.fillStyle = withAlpha(palette.text, 0.6);
    ctx.font = `700 28px ${fontConf.family}`;
    ctx.textAlign = 'center';
    ctx.fillText('— 推荐 —', 0, 0);
    ctx.restore();
  }

  // ─── 12. 中部横向手绘分割线 ───
  ctx.strokeStyle = withAlpha(palette.primary, 0.5);
  ctx.lineWidth = 3;
  ctx.setLineDash([10, 6]);
  ctx.beginPath();
  ctx.moveTo(W * 0.15, H * 0.46);
  ctx.lineTo(W * 0.85, H * 0.46);
  ctx.stroke();
  ctx.setLineDash([]);

  // ─── 13. 撕边便签底部小阴影笔触 ───
  ctx.save();
  ctx.translate(W * 0.5, H * 0.95);
  ctx.strokeStyle = withAlpha(palette.primary, 0.25);
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const dx = (i - 2) * 30;
    ctx.moveTo(dx, 0);
    ctx.lineTo(dx + 12, -8);
  }
  ctx.stroke();
  ctx.restore();
  if (t.length <= 4) {
    ctx.save();
    ctx.translate(W * 0.5, H * 0.18);
    ctx.fillStyle = withAlpha(palette.text, 0.6);
    ctx.font = `700 28px ${fontConf.family}`;
    ctx.textAlign = 'center';
    ctx.fillText('— 推荐 —', 0, 0);
    ctx.restore();
  }
}

// ═══════════ 风格族 C · 漫画 pop 风 ═══════════
// ════════════════════════════════════════════════════════════════

/**
 * 风格族 C 渲染函数
 * @param {CanvasRenderingContext2D} ctx
 * @param {string} text
 * @param {object} palette - comicPop 配色
 * @param {object} options
 */
function styleC_comicPop(ctx, text, palette, options) {
  const W = CANVAS_W, H = CANVAS_H;
  const seed = (options && options.seed) || 1;
  const fontConf = FONT_MAP[STATE.font] || FONT_MAP.black;
  const t = (text || 'OMG 绝了').slice(0, 30);

  // ─── 1. 纯色背景 ───
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);

  // ─── 2. 半色调网点覆盖全画 ───
  drawHalftone(ctx, 0, 0, W, H, palette.halftone, palette.halftoneOpacity || 0.3);

  // ─── 3. 漫画放射线(从中心向外) ───
  drawComicBurst(ctx, W / 2, H / 2, Math.max(W, H) * 0.75, 90, 18, '#FFFFFF');

  // ─── 4. 主标题(粗黑体 + 黑色描边,漫画感) ───
  const fontSize = fs(t, W * 0.78, H * 0.34, 80, 280, fontConf.scale);
  drawWrappedText(ctx, t, W / 2, H * 0.45, W * 0.78, fontSize, palette.text, {
    align: 'center', vAlign: 'middle', lineHeight: 1.15,
    fontFamily: fontConf.family, fontWeight: fontConf.weight,
    stroke: { color: '#000000', width: 10 },
  });

  // ─── 5. 对话气泡(右上,内含感叹词) ───
  const exclaims = ['哇!','啊!','OMG!','绝了!','炸裂!','牛!'];
  const bubbleW = 260, bubbleH = 140;
  drawSpeechBubble(ctx, W * 0.75 - bubbleW / 2, H * 0.16, bubbleW, bubbleH, '#FFFFFF', '#000000', 'left');
  ctx.fillStyle = '#000000';
  ctx.font = `900 60px ${fontConf.family}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(exclaims[seed % 6], W * 0.75, H * 0.16 + bubbleH / 2 + 6);

  // ─── 6. 3D emoji(左下角) ───
  const bigEmojis = ['🔥','💥','⭐','✨','💯','🎉'];
  drawEmojiSticker(ctx, W * 0.18, H * 0.82, 180, bigEmojis[seed % bigEmojis.length]);

  // ─── 7. 漫画爆炸星(左上) ───
  drawComicBurst(ctx, W * 0.15, H * 0.16, 90, 30, 12, palette.accent);

  // ─── 8. 拟声词(右下,带描边) ───
  if (t.length <= 6) {
    ctx.save();
    ctx.translate(W * 0.8, H * 0.78);
    ctx.rotate(-12 * Math.PI / 180);
    ctx.font = `900 100px ${fontConf.family}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = 8;
    ctx.strokeStyle = '#000000';
    ctx.lineJoin = 'round';
    ctx.strokeText('WOW!', 0, 0);
    ctx.fillStyle = palette.accent;
    ctx.fillText('WOW!', 0, 0);
    ctx.restore();
  }

  // ─── 9. 底部小字 ───
  ctx.fillStyle = withAlpha('#000000', 0.7);
  ctx.font = `700 32px ${fontConf.family}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('!!! AMAZING !!!', W / 2, H * 0.96);

  // ─── 10. 角落小爆炸星(右下) ───
  drawComicBurst(ctx, W * 0.92, H * 0.12, 50, 18, 8, '#FFFFFF');

  // ─── 11. 底部装饰小线条(漫画动线) ───
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(W * 0.05, H * 0.95);
  ctx.lineTo(W * 0.15, H * 0.95);
  ctx.moveTo(W * 0.85, H * 0.95);
  ctx.lineTo(W * 0.95, H * 0.95);
  ctx.stroke();

  // ─── 12. 顶部对角动线 ───
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(W * 0.06, H * 0.06);
  ctx.lineTo(W * 0.14, H * 0.06);
  ctx.moveTo(W * 0.86, H * 0.06);
  ctx.lineTo(W * 0.94, H * 0.06);
  ctx.stroke();

  // ─── 13. 中部小爆炸装饰 ───
  drawComicBurst(ctx, W * 0.5, H * 0.85, 45, 15, 8, '#000000');

  // ─── 14. 角落小星标 ───
  ctx.fillStyle = '#FFFFFF';
  for (let i = 0; i < 4; i++) {
    const sx = W * (0.1 + i * 0.27);
    const sy = H * 0.05;
    ctx.save();
    ctx.translate(sx, sy);
    drawComicBurst(ctx, 0, 0, 18, 6, 5, '#FFFFFF');
    ctx.restore();
  }
}

// ═══════════ 风格族 D · 报纸大字风 ═══════════
// ════════════════════════════════════════════════════════════════

/**
 * 风格族 D 渲染函数
 * @param {CanvasRenderingContext2D} ctx
 * @param {string} text
 * @param {object} palette - newspaper 配色
 * @param {object} options
 */
function styleD_newspaper(ctx, text, palette, options) {
  const W = CANVAS_W, H = CANVAS_H;
  const seed = (options && options.seed) || 1;
  const fontConf = FONT_MAP[STATE.font] || FONT_MAP.black;
  const t = (text || '年度盘点').slice(0, 30);

  // ─── 1. 纯色背景 ───
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);

  // ─── 2. 顶部小标签 ───
  ctx.fillStyle = withAlpha(palette.text, 0.85);
  ctx.font = `700 36px ${fontConf.family}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('— ANNUAL REPORT 2026 —', W / 2, H * 0.05);

  // ─── 3. 主标题(超粗字,占画面 35%) ───
  const mainSize = fs(t, W * 0.88, H * 0.36, 90, 280, fontConf.scale);
  drawWrappedText(ctx, t, W / 2, H * 0.32, W * 0.88, mainSize, palette.text, {
    align: 'center', vAlign: 'middle', lineHeight: 1.08,
    fontFamily: fontConf.family, fontWeight: fontConf.weight,
  });

  // ─── 4. 副标题(下一行小字) ───
  const subText = pick(['TOP 10', '年度精选', '独家盘点', '编辑推荐', '必看系列', '精选合集'], seed);
  ctx.fillStyle = palette.secondary;
  ctx.font = `700 56px ${fontConf.family}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(subText, W / 2, H * 0.32 + mainSize * 1.10 + 24);

  // ─── 5. 荧光笔高亮(主标题字下方) ───
  drawHighlighter(ctx, W * 0.22, H * 0.22, W * 0.5, 40, palette.accent);

  // ─── 6. 分隔线 ───
  ctx.strokeStyle = withAlpha(palette.secondary, 0.5);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W * 0.12, H * 0.6);
  ctx.lineTo(W * 0.88, H * 0.6);
  ctx.stroke();

  // ─── 7. 底部 3 栏小字(信息层叠) ───
  const colTexts = [
    ['Vol.01', 'NO.1'],
    ['Vol.02', 'NO.2'],
    ['Vol.03', 'NO.3'],
  ];
  for (let i = 0; i < 3; i++) {
    const colX = W * 0.2 + i * (W * 0.3);
    ctx.fillStyle = withAlpha(palette.secondary, 0.85);
    ctx.font = `400 30px ${fontConf.family}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(colTexts[i][0], colX, H * 0.66);
    ctx.fillStyle = palette.text;
    ctx.font = `900 48px ${fontConf.family}`;
    ctx.fillText(colTexts[i][1], colX, H * 0.70);
  }

  // ─── 8. 红色印章(右下) ───
  drawStamp(ctx, W * 0.85, H * 0.88, 140, 140, 'TOP', palette.accent, -10 * Math.PI / 180);

  // ─── 9. 底部小标签 ───
  ctx.fillStyle = withAlpha(palette.text, 0.65);
  ctx.font = `400 26px ${fontConf.family}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('— THE BEST OF 2026 —', W / 2, H * 0.97);

  // ─── 10. 角落装饰小字 ───
  ctx.fillStyle = withAlpha(palette.text, 0.4);
  ctx.font = `400 24px ${fontConf.family}`;
  ctx.textAlign = 'left';
  ctx.fillText('№' + (1000 + seed * 137 % 9000), W * 0.05, H * 0.97);

  // ─── 11. 左上角小印章(红色质量章) ───
  drawStamp(ctx, W * 0.1, H * 0.13, 80, 80, 'NEW', '#E6213D', -8 * Math.PI / 180);

  // ─── 12. 顶部装饰横条 ───
  ctx.fillStyle = palette.accent;
  ctx.fillRect(0, 0, W, 18);
  ctx.fillStyle = withAlpha(palette.text, 0.15);
  ctx.fillRect(0, H - 18, W, 18);

  // ─── 13. 底部小波浪线 ───
  ctx.strokeStyle = withAlpha(palette.text, 0.35);
  ctx.lineWidth = 2;
  ctx.beginPath();
  const waveY = H * 0.92;
  ctx.moveTo(W * 0.1, waveY);
  for (let x = W * 0.1; x <= W * 0.9; x += 8) {
    ctx.lineTo(x, waveY + Math.sin((x - W * 0.1) * 0.05) * 4);
  }
  ctx.stroke();

  // ─── 14. 右侧小标签(竖排) ───
  ctx.save();
  ctx.translate(W * 0.95, H * 0.5);
  ctx.rotate(90 * Math.PI / 180);
  ctx.fillStyle = withAlpha(palette.text, 0.6);
  ctx.font = `700 28px ${fontConf.family}`;
  ctx.textAlign = 'center';
  ctx.fillText('FEATURED', 0, 0);
  ctx.restore();
}

// ═══════════ 风格族 E · 极简大字风 ═══════════
// ════════════════════════════════════════════════════════════════

/**
 * 风格族 E 渲染函数
 * @param {CanvasRenderingContext2D} ctx
 * @param {string} text
 * @param {object} palette - minimal 配色
 * @param {object} options
 */
function styleE_minimal(ctx, text, palette, options) {
  const W = CANVAS_W, H = CANVAS_H;
  const seed = (options && options.seed) || 1;
  const fontConf = FONT_MAP[STATE.font] || FONT_MAP.black;
  const t = (text || '极简').slice(0, 30);

  // ─── 1. 纯色背景 ───
  ctx.fillStyle = palette.bg;
  ctx.fillRect(0, 0, W, H);

  // ─── 2. 主标题(超大字,占画面 75%) ───
  const fontSize = fs(t, W * 0.92, H * 0.78, 120, 400, fontConf.scale);
  drawWrappedText(ctx, t, W / 2, H / 2, W * 0.9, fontSize, palette.text, {
    align: 'center', vAlign: 'middle', lineHeight: 1.04,
    fontFamily: fontConf.family, fontWeight: fontConf.weight,
  });

  // ─── 3. 可选:1 个极小几何装饰 ───
  if (seed % 4 === 0) {
    drawHandDrawnCircle(ctx, W * 0.1, H * 0.92, 40, 40, palette.accent, 5);
  }

  // ─── 4. 可选:角落 1 个小色块 ───
  if (seed % 5 === 0) {
    ctx.fillStyle = palette.accent;
    ctx.fillRect(W * 0.06, H * 0.06, 60, 60);
  }

  // ─── 5. 可选:小写日期(底部小字) ───
  if (seed % 3 === 0) {
    ctx.fillStyle = withAlpha(palette.text, 0.5);
    ctx.font = `400 28px ${fontConf.family}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('—— 2026 ——', W / 2, H * 0.96);
  }

  // ─── 6. 可选:细横线 ───
  if (seed % 2 === 0) {
    ctx.strokeStyle = withAlpha(palette.text, 0.25);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W * 0.2, H * 0.88);
    ctx.lineTo(W * 0.8, H * 0.88);
    ctx.stroke();
  }

  // ─── 7. 可选:右上小角标 ───
  if (seed % 6 === 0) {
    ctx.fillStyle = palette.text;
    ctx.fillRect(W * 0.88, H * 0.04, 100, 30);
    ctx.fillStyle = palette.bg;
    ctx.font = `900 22px ${fontConf.family}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('NEW', W * 0.93, H * 0.055 + 15);
  }
}

// ════════════════════════════════════════════════════════════════
// ═══════════ 渲染主流程 ═══════════
// ════════════════════════════════════════════════════════════════

const STYLE_FUNCS = {
  A: styleA_handDrawn,
  B: styleB_collage,
  C: styleC_comicPop,
  D: styleD_newspaper,
  E: styleE_minimal,
};

// 按风格族 + vi + seedOffset 选配色
function pickPalette(family, vi, seedOffset) {
  const key = FAMILY_TO_PALETTE[family];
  if (!key || !PALETTES[key]) {
    return { bg: '#FFFFFF', text: '#000000', primary: '#888888', secondary: '#CCCCCC', accent: '#FFEC47' };
  }
  const pool = PALETTES[key];
  const keys = Object.keys(pool);
  return pool[keys[(vi + seedOffset) % keys.length]];
}

// 渲染单张到 canvas(完整实现见下方"并发渲染 + 错误兜底"段)
// 函数声明会 hoisting,此处不再保留 stub,避免重复声明报错。

// 构造卡片 DOM(包装 canvas + actions)
function buildOneCard(family, vi, text, seedOffset) {
  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';
  wrap.dataset.family = family;
  wrap.dataset.vi = vi;

  const canvas = document.createElement('canvas');
  canvas.setAttribute('aria-label', FAMILY_LABELS[family].name + ' 第 ' + (vi + 1) + ' 张');
  renderCard(canvas, family, vi, text, seedOffset);

  // actions:下载 / 复制 / 换一换
  const actions = document.createElement('div');
  actions.className = 'actions';
  actions.innerHTML =
    '<button class="act-btn" title="下载 PNG" aria-label="下载 PNG" data-act="dl">⬇</button>' +
    '<button class="act-btn" title="复制到剪贴板" aria-label="复制" data-act="cp">📋</button>' +
    '<button class="act-btn spin" title="换一换" aria-label="换一换" data-act="rr">↻</button>';
  actions.addEventListener('click', (ev) => {
    ev.stopPropagation();
    const btn = ev.target.closest('.act-btn');
    if (!btn) return;
    const act = btn.dataset.act;
    if (act === 'dl') downloadCanvas(canvas);
    else if (act === 'cp') copyCanvas(canvas);
    else if (act === 'rr') rerollOne(wrap);
  });
  wrap.appendChild(canvas);
  wrap.appendChild(actions);
  wrap.addEventListener('click', () => downloadCanvas(canvas));
  return wrap;
}

// ════════════════════════════════════════════════════════════════
// ═══════════ 主流程:生成 + 网格 + 交互 ═══════════
// ════════════════════════════════════════════════════════════════

/**
 * 主生成函数 — 读取输入框文本,渲染所有启用风格族的卡片。
 * 流程:
 *   1. 校验文本(非空、≤30 字)
 *   2. 禁用按钮 + 显示"生成中"状态
 *   3. setTimeout 30ms 让 UI 先更新(避免阻塞)
 *   4. 按顺序构建每个风格族的 section 标签 + 6 张卡片
 *   5. 统计实际生成数,toast 提示
 *   6. 恢复按钮状态
 */
function generate() {
  const text = (document.getElementById('textInput').value || '').trim();
  STATE.text = text;
  if (!text) {
    showToast('请输入文案');
    return;
  }
  if (text.length > 30) {
    showToast('文案不能超过 30 字');
    return;
  }
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.innerHTML = '⏳ 生成中...';

  const c = document.getElementById('container');
  c.innerHTML = '<div class="loading">生成中</div>';

  // 用 setTimeout 让 UI 先更新
  setTimeout(() => {
    try {
      c.innerHTML = '';
      const families = Array.from(STATE.families).sort();
      for (const fam of families) {
        // section 标签
        const lb = document.createElement('div');
        lb.className = 'section-label';
        lb.innerHTML =
          '<span class="section-num">' + fam + '</span>' +
          '<span>' + FAMILY_LABELS[fam].name + '</span>' +
          '<span class="s-tag">' + FAMILY_LABELS[fam].tag + '</span>' +
          '<span class="section-desc">' + FAMILY_LABELS[fam].desc + '</span>';
        c.appendChild(lb);
        const g = document.createElement('div');
        g.className = 'grid';
        c.appendChild(g);
        for (let vi = 0; vi < CARDS_PER_FAMILY; vi++) {
          const card = buildOneCard(fam, vi, text, STATE.seed);
          g.appendChild(card);
        }
      }
      STATE.activeCount = families.length * CARDS_PER_FAMILY;
      const fontName = (FONT_MAP[STATE.font] || FONT_MAP.black).name;
      showToast('✅ ' + families.length + ' 族 × ' + CARDS_PER_FAMILY + ' 张 · ' + fontName + ' · ' + text.length + ' 字');
    } catch (e) {
      console.error(e);
      showToast('❌ 生成失败: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '🎨 生成 30 张';
    }
  }, 30);
}

/**
 * 装饰位置分配器(批次 5 新增,集中管理避免冲突)
 * 规则:同一画面装饰元素数量严格遵守 v3.0 §4.4
 *   - A 手绘便签: 4-6 个 (横线 + 胶带 + 手绘圈 + 卡通 + 1-2 emoji)
 *   - B 拼贴    : 5-7 个 (2-3 便签 + 色块 + 印章 + 箭头 + emoji)
 *   - C 漫画 pop: 4-6 个 (半色调 + 气泡 + 放射 + 拟声 + 3D emoji)
 *   - D 报纸    : 3-4 个 (主+副+印章+几何)
 *   - E 极简    : 0-1 个 (≤1 几何)
 *
 * 位置互斥规则(§5.3):
 *   - drawHandDrawnCircle  : 圈住第 1 字 或 最后 1 字
 *   - drawHighlighter      : 横跨第 2 行
 *   - drawStamp            : 右下 或 左上(随机,旋转 -10°~ -25°)
 *   - drawEmojiSticker     : 与 drawStamp 对角
 *   - drawComicBurst       : 画面中心 或 主角字背后
 *
 * 返回值: { stampCorner, emojiCorner, circleTarget, ... }
 */
function allocDecorPositions(seed) {
  const corners = ['tl', 'tr', 'bl', 'br'];  // top-left, top-right, bottom-left, bottom-right
  const stampCorner = corners[(seed + 2) % 4];  // 右下或左上为主
  const oppositeMap = { tl: 'br', tr: 'bl', bl: 'tr', br: 'tl' };
  const emojiCorner = oppositeMap[stampCorner];
  const circleTarget = (seed % 2 === 0) ? 'first' : 'last';
  const highlighterLine = 2;
  const stampRot = -(10 + (seed % 16));  // -10° ~ -25°
  return { stampCorner, emojiCorner, circleTarget, highlighterLine, stampRot };
}

/**
 * 单卡片换一换(批次 5 改进:0.3s 淡入淡出过渡)
 * @param {HTMLElement} wrap - 卡片容器元素
 */
function rerollOne(wrap) {
  const fam = wrap.dataset.family;
  const vi = parseInt(wrap.dataset.vi, 10);
  const newVi = (vi + 1 + Math.floor(Math.random() * 3)) % CARDS_PER_FAMILY;
  const newCard = buildOneCard(fam, newVi, STATE.text, STATE.seed + Math.floor(Math.random() * 10));

  // 0.3s 淡入淡出过渡(批次 5 要求)
  newCard.style.opacity = '0';
  newCard.style.transform = 'scale(.95)';
  newCard.style.transition = 'opacity .3s ease, transform .3s ease';

  const oldOpacity = wrap.style.opacity || '1';
  wrap.style.transition = 'opacity .3s ease';
  wrap.style.opacity = '0';

  setTimeout(() => {
    wrap.replaceWith(newCard);
    requestAnimationFrame(() => {
      newCard.style.opacity = '1';
      newCard.style.transform = 'scale(1)';
    });
  }, 280);

  // 兜底:若卡片意外未替换,恢复 oldOpacity
  setTimeout(() => {
    if (wrap.parentNode) wrap.style.opacity = oldOpacity;
  }, 350);
}

/**
 * 全部换一换 — 增加全局 seed 并重新调用 generate
 * seed 累加 7 保证新配色与旧配色差异较大
 */
function rerollAll() {
  STATE.seed += 7;
  generate();
}

/**
 * 清空当前画布,回到空状态
 * 用于外部调用(如 ESC 键清空)
 */
function clearAll() {
  const c = document.getElementById('container');
  c.innerHTML =
    '<div class="empty-state" id="emptyState">' +
    '<div class="empty-icon">📱</div>' +
    '<div class="empty-title">输入文案,生成小红书封面</div>' +
    '<div class="empty-desc">5 大风格族 · 6 套配色 · 8 类字体<br>字数自适应 · 装饰互斥 · Canvas 直出 1242×1656</div>' +
    '</div>';
  STATE.text = '';
  document.getElementById('textInput').value = '';
  updateCounter();
  showToast('已清空');
}

// 暴露给外部调用(window.generate / window.rerollAll 供 onclick 使用)
window.generate = generate;
window.rerollAll = rerollAll;
window.clearAll = clearAll;
window.downloadCanvas = downloadCanvas;
window.copyCanvas = copyCanvas;

// ═══════════ 下载 / 复制 ═══════════

/**
 * 将 canvas 内容下载为 PNG(批次 5:使用 downloadCanvasSafe)
 */
function downloadCanvas(canvas) {
  downloadCanvasSafe(canvas, 'cover_' + Date.now() + '.png');
}

/**
 * 将 canvas 内容复制到剪贴板(PNG 格式)
 */
async function copyCanvas(canvas) {
  if (!navigator.clipboard || !window.ClipboardItem) {
    showToast('❌ 浏览器不支持剪贴板图片');
    return;
  }
  try {
    const blob = await new Promise((res) => canvas.toBlob(res, 'image/png'));
    if (!blob) {
      showToast('❌ 生成图片失败');
      return;
    }
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    showToast('📋 已复制到剪贴板');
  } catch (e) {
    console.error(e);
    showToast('❌ 复制失败: ' + e.message);
  }
}

// ═══════════ Toast 提示 ═══════════

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
window.showToast = showToast;

function updateCounter() {
  const v = document.getElementById('textInput').value;
  const n = v.replace(/\s/g, '').length;
  const c = document.getElementById('counter');
  c.textContent = n + ' / 30 字';
  c.className = 'counter' + (n > 25 ? ' warn' : '');
}
document.getElementById('textInput').addEventListener('input', updateCounter);

document.querySelectorAll('#familyTabs .tab').forEach((btn) => {

    btn.classList.toggle('active');

      STATE.families.add(fam);
      btn.classList.add('active');

document.querySelectorAll('#fontTabs .tab').forEach((btn) => {

document.getElementById('btnGenerate').addEventListener('click', generate);
document.getElementById('btnRerollAll').addEventListener('click', rerollAll);

// Ctrl/Cmd + Enter 触发生成
document.getElementById('textInput').addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    generate();

});

/*
 * ═══════════════════════════════════════════════════════════════
 *  字体降级策略
 * ───────────────────────────────────────────────
 *  如果 Google Fonts 加载失败(国内某些网络环境),
 *  CSS @import 会失败,字体回退到 PingFang SC / Songti SC 等系统字体。
 *  本系统字体栈已在 FONT_MAP.family 中定义回退:
 *    '"Noto Sans SC","PingFang SC",sans-serif'
 *  因此即使 CDN 不可用,文字仍能正常渲染,只是样式略有差异。
 * ═══════════════════════════════════════════════════════════════
 */

// 字体加载失败时降级到系统字体(批次 5 改造:10s 超时 + 重渲染)
if (document.fonts && document.fonts.ready) {
  // 10s 超时降级
  const fontTimeout = new Promise((resolve) => setTimeout(resolve, 10000));
  Promise.race([document.fonts.ready, fontTimeout]).then(() => {
    if (document.fonts.status === 'loaded') {
      console.log('[v3.0] 字体加载完成');
      // 字体到位后,如已有内容,触发 measureText 重新计算字号重渲染
      if (STATE.text) generate();
    } else {
      console.warn('[v3.0] 字体加载超时,降级到系统字体');
    }
  }).catch((e) => {
    console.warn('[v3.0] 字体加载失败', e);
  });
}

updateCounter();

  'color:#666;font-size:11px;');
console.log('已加载 features:', Object.keys(window.STYLE_FUNCS || {}).join(', '));
console.log('已加载字体:', Object.keys(FONT_MAP).join(', '));
console.log('已加载调色板风格族:', Object.keys(PALETTES).join(', '));

// ═══════════ 并发渲染 + 错误兜底(批次 5 新增)═══════════

/**
 * 渲染单张卡片到 canvas(批次 5:增加超时与错误兜底)
 * @param {HTMLCanvasElement} canvas
 * @param {string} family
 * @param {number} vi
 * @param {string} text
 * @param {number} seedOffset
 */
function renderCard(canvas, family, vi, text, seedOffset) {
  try {
    const ctx = canvas.getContext('2d');
    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;
    const palette = pickPalette(family, vi, seedOffset);
    const fn = STYLE_FUNCS[family];
    if (!fn) throw new Error('Style family ' + family + ' undefined');
    // 性能监控(单张 < 50ms 目标)
    const t0 = performance.now();
    fn(ctx, text, palette, { seed: vi + seedOffset });
    const t1 = performance.now();
    if (t1 - t0 > 80) {
      console.warn('[v3.0] 卡片渲染耗时偏长:', (t1 - t0).toFixed(1), 'ms ·', family, vi);
    }
  } catch (e) {
    console.error('[v3.0] renderCard error:', family, vi, e);
    // 错误占位
    try {
      const ctx = canvas.getContext('2d');
      canvas.width = CANVAS_W;
      canvas.height = CANVAS_H;
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.fillStyle = '#E6213D';
      ctx.font = '40px "PingFang SC",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚠ 渲染失败', CANVAS_W / 2, CANVAS_H / 2 - 30);
      ctx.font = '28px "PingFang SC",sans-serif';
      ctx.fillStyle = '#888888';
      ctx.fillText(e.message || String(e), CANVAS_W / 2, CANVAS_H / 2 + 30);
    } catch (_) {
      // 双重兜底
      canvas.width = 100;
      canvas.height = 100;
    }
  }
}

/**
 * 并发构建所有卡片(批次 5 优化:Promise.all + requestAnimationFrame 分批)
 * 默认 20 张/次,每帧最多构建 4 张,避免阻塞主线程
 * @param {string} text - 文案
 * @returns {Promise<HTMLElement[]>} - 卡片数组
 */
async function buildAllCardsAsync(text) {
  const families = Array.from(STATE.families).sort();
  const totalCount = families.length * CARDS_PER_FAMILY;
  // 任务列表:{family, vi, seedOffset}
  const tasks = [];
  for (const fam of families) {
    for (let vi = 0; vi < CARDS_PER_FAMILY; vi++) {
      tasks.push({ family: fam, vi, seedOffset: STATE.seed });
    }
  }
  // 分批:每批 4 张,每批后等待 requestAnimationFrame
  const BATCH = 4;
  const cards = [];
  for (let i = 0; i < tasks.length; i += BATCH) {
    const slice = tasks.slice(i, i + BATCH);
    const batchCards = slice.map((t) =>
      buildOneCard(t.family, t.vi, text, t.seedOffset)
    );
    cards.push(...batchCards);
    // 让浏览器有机会重绘,避免阻塞
    await new Promise((resolve) => requestAnimationFrame(resolve));
  }
  return cards;
}

/**
 * 下载失败兜底(批次 5 新增)
 * 当 canvas.toBlob 失败或浏览器拦截下载时,提示用户右键另存为
 */
function downloadCanvasSafe(canvas, fallbackName) {
  try {
    canvas.toBlob((blob) => {
      if (!blob) {
        showToast('❌ 下载失败,请右键图片选择「图片另存为」');
        return;
      }
      try {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fallbackName || ('cover_' + Date.now() + '.png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        showToast('⬇ 已下载');
      } catch (e) {
        console.error('[v3.0] 下载失败:', e);
        showToast('❌ 下载失败,请右键图片另存为');
      }
    }, 'image/png');
  } catch (e) {
    console.error('[v3.0] canvas.toBlob 异常:', e);
    showToast('❌ 下载失败,请右键图片另存为');
  }
}

/*
 * ═══════════════════════════════════════════════════════════════
 *  移动端长按下载(批次 5 改造)
 * ───────────────────────────────────────────────
 *  移动端 hover 不工作,改用 touch 长按 0.5s 触发下载。
 *  使用 touchstart/touchend + 计时器实现。
 * ═══════════════════════════════════════════════════════════════
 */
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouchDevice) {
  let longPressTimer = null;
  let longPressTarget = null;
  const LONG_PRESS_MS = 500;

  document.addEventListener('touchstart', (e) => {
    const card = e.target.closest('.card-wrap');
    if (!card) return;
    const canvas = card.querySelector('canvas');
    if (!canvas) return;
    longPressTarget = canvas;
    longPressTimer = setTimeout(() => {
      if (longPressTarget) {
        downloadCanvas(longPressTarget);
        if (navigator.vibrate) navigator.vibrate(40);
      }
      longPressTimer = null;
    }, LONG_PRESS_MS);
  }, { passive: true });

  const cancelLongPress = () => {
    if (longPressTimer) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }
    longPressTarget = null;
  };
  document.addEventListener('touchend', cancelLongPress);
  document.addEventListener('touchmove', cancelLongPress, { passive: true });

  console.log('[v3.0] 移动端长按下载已启用(0.5s)');
}

/*
 * ═══════════════════════════════════════════════════════════════
 *  Tab 顺序优化(批次 5 要求)
 * ───────────────────────────────────────────────
 *  HTML 默认 Tab 顺序遵循 source order:
 *    textarea → btnGenerate → btnRerollAll → 字体 tabs → 风格族 tabs → 卡片 actions
 *  此处显式标注 tabindex 确保键盘可达性。
 * ═══════════════════════════════════════════════════════════════
 */
function setupTabOrder() {
  const focusables = [
    document.getElementById('textInput'),
    document.getElementById('btnGenerate'),
    document.getElementById('btnRerollAll'),
    ...document.querySelectorAll('#fontTabs .tab'),
    ...document.querySelectorAll('#familyTabs .tab'),
  ];
  focusables.forEach((el, i) => {
    if (el) el.setAttribute('tabindex', i + 1);
  });
  // 卡片 actions 设为可聚焦
  document.addEventListener('focusin', (e) => {
    if (e.target.closest('.act-btn')) {
      const parent = e.target.closest('.card-wrap');
      if (parent) parent.style.outline = '2px solid #5a8cb8';
    }
  });
  document.addEventListener('focusout', (e) => {
    if (e.target.closest('.act-btn')) {
      const parent = e.target.closest('.card-wrap');
      if (parent) parent.style.outline = '';
    }
  });
}
setupTabOrder();
